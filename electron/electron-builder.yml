appId: com.runweave.desktop
productName: Runweave
copyright: Copyright © 2024 Runweave contributors

npmRebuild: false
afterPack: scripts/adhoc-sign-mac.js

directories:
  buildResources: resources
  output: release

files:
  - dist/**/*
  - resources/**/*
  - "!resources/icons/raw/**"
  - "!node_modules/**/*"

extraResources:
  - from: resources/hooks
    to: runweave-hook-runtime/hooks
    filter:
      - "**/*"
  - from: ../frontend/dist
    to: frontend/dist
    filter:
      - "**/*"
  - from: ../backend/node_modules/node-pty
    to: backend/node_modules/node-pty
    filter:
      - "lib/**/*"
      - "prebuilds/darwin-arm64/**/*"
      - "package.json"
      - "LICENSE"
  - from: ../.native-artifacts/better-sqlite3/electron-33.4.11-darwin-arm64/resources-backend
    to: backend
    filter:
      - "**/*"

mac:
  icon: resources/icons/icon.icns
  category: public.app-category.developer-tools
  identity: null
  hardenedRuntime: false
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
