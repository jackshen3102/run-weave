appId: com.browser-viewer.desktop
productName: Browser Viewer
copyright: Copyright © 2024

npmRebuild: false

directories:
  buildResources: resources
  output: release

files:
  - dist/**/*
  - resources/**/*
  - "!resources/icons/raw/**"
  - "!node_modules/**/*"

extraResources:
  - from: ../frontend/dist
    to: frontend/dist
    filter:
      - "**/*"
  - from: ../backend/node_modules/node-pty
    to: backend/node_modules/node-pty
    filter:
      - "lib/**/*"
      - "prebuilds/darwin-arm64/**/*"
      - "package.json"
      - "LICENSE"

mac:
  icon: resources/icons/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
