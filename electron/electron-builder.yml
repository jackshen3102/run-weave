appId: com.browser-viewer.desktop
productName: Browser Viewer
copyright: Copyright © 2024

npmRebuild: false

directories:
  buildResources: resources
  output: release

files:
  - dist/**/*
  - resources/**/*
  - "!resources/icons/raw/**"
  - "!node_modules/**/*"

extraResources:
  - from: ../frontend/dist
    to: frontend/dist
    filter:
      - "**/*"

mac:
  icon: resources/icons/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development

publish:
  provider: github
  owner: browser-viewer
  repo: browser-viewer
  releaseType: release
