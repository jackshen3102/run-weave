appId: com.browser-viewer.desktop
productName: Browser Viewer
copyright: Copyright © 2024

npmRebuild: false

directories:
  buildResources: resources
  output: release

files:
  - dist/**/*
  - resources/**/*
  - "!resources/icons/raw/**"
  - "!node_modules/**/*"

extraResources:
  - from: ../frontend/dist
    to: frontend/dist
    filter:
      - "**/*"

mac:
  icon: resources/icons/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
