  <rect x="906" y="260" width="472" height="34" fill="#111827" />
  <text x="926" y="282" class="mono" font-size="12" fill="#e2e8f0">
    terminal-code-preview.md
  </text>
  <g clip-path="url(#editorClip)" class="mono" font-size="12">
    <rect x="906" y="294" width="48" height="514" fill="#020617" />
    <text x="936" y="322" fill="#475569" text-anchor="end">1</text>
    <text x="936" y="348" fill="#475569" text-anchor="end">2</text>
    <text x="936" y="374" fill="#475569" text-anchor="end">3</text>
    <text x="936" y="400" fill="#475569" text-anchor="end">4</text>
    <text x="936" y="426" fill="#475569" text-anchor="end">5</text>
    <text x="936" y="452" fill="#475569" text-anchor="end">6</text>
    <text x="936" y="478" fill="#475569" text-anchor="end">7</text>
    <text x="936" y="504" fill="#475569" text-anchor="end">8</text>
    <text x="970" y="322" fill="#60a5fa"># Terminal code preview</text>
    <text x="970" y="348" fill="#94a3b8"></text>
    <text x="970" y="374" fill="#e2e8f0">
      Runweave Terminal uses Preview as a temporary reading space.
    </text>
    <text x="970" y="400" fill="#94a3b8"></text>
    <text x="970" y="426" fill="#60a5fa">## Goals</text>
    <text x="970" y="452" fill="#e2e8f0">
      - [x] Read plans without leaving Terminal
    </text>
    <text x="970" y="478" fill="#e2e8f0">
      - [x] Keep code and docs read-only
    </text>
    <text x="970" y="504" fill="#e2e8f0">
      - [x] Use one panel area, no split preview
    </text>
    <text x="970" y="556" fill="#60a5fa">## Interaction</text>
    <text x="970" y="582" fill="#e2e8f0">
      Source only. Split and Preview remain one click away.
    </text>
    <text x="970" y="634" fill="#e2e8f0">
      See also: [testing layers](../testing/layers.md).
    </text>
  </g>

  <rect
    x="934"
    y="742"
    width="390"
    height="38"
    rx="8"
    fill="#020617"
    stroke="#334155"
  />
  <text x="956" y="766" class="ui" font-size="11" fill="#94a3b8">
