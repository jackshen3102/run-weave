<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1440"
  height="900"
  viewBox="0 0 1440 900"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Markdown source view in the Terminal preview panel</title>
  <desc id="desc">
    Runweave Terminal with a right-side Preview panel showing the same Markdown
    file in readonly Monaco source view, with Source, Split, and Preview
    available as view switches.
  </desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="terminal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020617" />
      <stop offset="1" stop-color="#0b1120" />
    </linearGradient>
    <filter id="windowShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow
        dx="0"
        dy="28"
        stdDeviation="26"
        flood-color="#020617"
        flood-opacity="0.62"
      />
    </filter>
    <clipPath id="editorClip">
      <rect x="906" y="260" width="472" height="548" />
    </clipPath>
    <style>
      .ui {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      .mono {
        font-family:
          "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace;
      }
      .muted {
        fill: #94a3b8;
      }
      .text {
        fill: #e2e8f0;
      }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#page)" />
  <rect
    x="22"
    y="22"
    width="1396"
    height="856"
    rx="24"
    fill="#020617"
    stroke="#1e293b"
    filter="url(#windowShadow)"
  />
  <rect x="22" y="22" width="1396" height="96" rx="24" fill="#0f172a" />
  <rect x="22" y="94" width="1396" height="24" fill="#020617" />
  <circle cx="52" cy="54" r="7" fill="#ef4444" />
  <circle cx="76" cy="54" r="7" fill="#f59e0b" />
  <circle cx="100" cy="54" r="7" fill="#22c55e" />
  <rect x="130" y="38" width="134" height="32" rx="16" fill="#f8fafc" />
  <text
