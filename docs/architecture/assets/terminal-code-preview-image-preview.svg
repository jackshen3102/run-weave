    Image preview
  </text>

  <rect
    x="754"
    y="270"
    width="616"
    height="510"
    fill="#0b1120"
    stroke="#1e293b"
  />
  <rect x="792" y="288" width="540" height="390" rx="10" fill="#f8fafc" />
  <g clip-path="url(#photoClip)">
    <rect x="792" y="288" width="540" height="390" fill="url(#photoSky)" />
    <circle cx="1218" cy="374" r="46" fill="#facc15" />
    <path d="M792 602l150-128 116 92 92-74 182 146v40H792z" fill="#16a34a" />
    <path d="M792 640l178-148 118 94 84-68 160 126v34H792z" fill="#15803d" />
    <path d="M792 678h540v-84l-132-94-94 70-136-112-178 152z" fill="#0f766e" />
    <rect
      x="860"
      y="332"
      width="156"
      height="42"
      rx="8"
      fill="#ffffff"
      opacity="0.88"
    />
    <text
      x="884"
      y="358"
      class="ui"
      font-size="15"
      font-weight="700"
      fill="#0f172a"
    >
      PNG preview
    </text>
  </g>
  <rect
    x="792"
    y="288"
    width="540"
    height="390"
    rx="10"
    fill="none"
    stroke="#cbd5e1"
  />
  <text x="838" y="724" class="ui" font-size="12" fill="#94a3b8">
    Standalone raster image uses object-fit: contain. No source switch in v1.
  </text>
</svg>
