<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1440"
  height="900"
  viewBox="0 0 1440 900"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">
    Standalone image file preview in the Terminal preview panel
  </title>
  <desc id="desc">
    Runweave Terminal with a right-side Preview panel opened to a standalone
    raster image file. The image is shown by default and the context bar only
    includes file path and common actions.
  </desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="terminal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020617" />
      <stop offset="1" stop-color="#0b1120" />
    </linearGradient>
    <linearGradient id="photoSky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#dbeafe" />
    </linearGradient>
    <filter id="windowShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow
        dx="0"
        dy="28"
        stdDeviation="26"
        flood-color="#020617"
        flood-opacity="0.62"
      />
    </filter>
    <clipPath id="photoClip">
      <rect x="792" y="288" width="540" height="390" rx="10" />
    </clipPath>
    <style>
      .ui {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      .mono {
        font-family:
          "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace;
      }
      .muted {
        fill: #94a3b8;
      }
      .text {
        fill: #e2e8f0;
      }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#page)" />
  <rect
    x="22"
    y="22"
    width="1396"
    height="856"
    rx="24"
    fill="#020617"
    stroke="#1e293b"
    filter="url(#windowShadow)"
  />
  <rect x="22" y="22" width="1396" height="96" rx="24" fill="#0f172a" />
  <rect x="22" y="94" width="1396" height="24" fill="#020617" />
  <circle cx="52" cy="54" r="7" fill="#ef4444" />
  <circle cx="76" cy="54" r="7" fill="#f59e0b" />
  <circle cx="100" cy="54" r="7" fill="#22c55e" />
  <rect x="130" y="38" width="134" height="32" rx="16" fill="#f8fafc" />
  <text
    x="154"
    y="59"
    class="ui"
    font-size="13"
    font-weight="700"
    fill="#020617"
  >
    Default Project
  </text>
  <rect
    x="276"
    y="38"
    width="112"
    height="32"
    rx="16"
    fill="#020617"
    stroke="#334155"
  />
  <text x="302" y="59" class="ui" font-size="13" fill="#cbd5e1">AI Worker</text>
  <rect x="1214" y="38" width="160" height="34" rx="17" fill="#2563eb" />
  <text
    x="1255"
    y="60"
    class="ui"
    font-size="13"
    font-weight="700"
    fill="#eff6ff"
  >
    New Project
  </text>

  <rect x="38" y="80" width="186" height="28" rx="14" fill="#f8fafc" />
  <text
    x="60"
    y="99"
    class="ui"
    font-size="12"
    font-weight="700"
    fill="#020617"
  >
    codex-agent
  </text>
  <rect
    x="235"
    y="80"
    width="176"
    height="28"
    rx="14"
    fill="#0f172a"
    stroke="#334155"
  />
  <text x="257" y="99" class="ui" font-size="12" fill="#cbd5e1">pnpm dev</text>
  <rect
    x="1114"
    y="80"
    width="148"
    height="28"
    rx="14"
    fill="#172554"
    stroke="#2563eb"
  />
  <text
    x="1136"
    y="99"
    class="ui"
    font-size="12"
    font-weight="700"
    fill="#bfdbfe"
  >
    Preview: File
  </text>
  <rect x="1272" y="80" width="120" height="28" rx="14" fill="#2563eb" />
  <text
    x="1294"
    y="99"
    class="ui"
    font-size="12"
    font-weight="700"
    fill="#eff6ff"
  >
    New Terminal
  </text>

  <rect
    x="38"
    y="136"
    width="644"
    height="710"
    fill="url(#terminal)"
    stroke="#1e293b"
  />
  <g class="mono" font-size="15">
    <text x="64" y="176" class="muted">$ codex</text>
    <text x="64" y="202" class="text">Open a screenshot in Preview.</text>
    <text x="64" y="250" class="muted">$ ls docs/assets</text>
    <text x="64" y="276" fill="#38bdf8">preview-panel-screenshot.png</text>
    <text x="64" y="324" class="muted">$</text>
    <rect
      x="84"
      y="311"
      width="10"
      height="20"
      rx="1"
      fill="#e2e8f0"
      opacity="0.86"
    />
  </g>

  <rect x="690" y="136" width="1" height="710" fill="#334155" />
  <rect x="701" y="404" width="8" height="118" rx="4" fill="#475569" />
  <rect
    x="722"
    y="136"
    width="680"
    height="710"
    fill="#020617"
    stroke="#1e293b"
  />

  <rect x="722" y="136" width="680" height="54" fill="#0f172a" />
  <text
    x="746"
    y="169"
    class="ui"
    font-size="14"
    font-weight="700"
    fill="#f8fafc"
  >
    Open file
  </text>
  <rect
    x="844"
    y="151"
    width="82"
    height="24"
    rx="12"
    fill="#172554"
    stroke="#2563eb"
  />
  <text x="864" y="168" class="ui" font-size="11" fill="#bfdbfe">
    Read only
  </text>
  <text x="1000" y="168" class="ui" font-size="10" fill="#64748b">
    Updated 4s ago
  </text>
  <rect
    x="1212"
    y="151"
    width="66"
    height="24"
    rx="12"
    fill="#020617"
    stroke="#334155"
  />
  <text x="1227" y="168" class="ui" font-size="10" fill="#cbd5e1">Refresh</text>
  <rect
    x="1286"
    y="151"
    width="72"
    height="24"
    rx="12"
    fill="#020617"
    stroke="#334155"
  />
  <text x="1300" y="168" class="ui" font-size="10" fill="#cbd5e1">
    Copy path
  </text>
  <rect
    x="1366"
    y="151"
    width="28"
    height="24"
    rx="12"
    fill="#020617"
    stroke="#334155"
  />
  <text x="1376" y="168" class="ui" font-size="11" fill="#cbd5e1">X</text>

  <rect
    x="722"
    y="190"
    width="680"
    height="48"
    fill="#020617"
    stroke="#1e293b"
  />
  <text x="746" y="219" class="mono" font-size="12" fill="#94a3b8">
    docs/assets/preview-panel-screenshot.png
  </text>
  <rect x="1242" y="202" width="116" height="24" rx="8" fill="#052e16" />
  <text
