<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1440"
  height="900"
  viewBox="0 0 1440 900"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">
    Markdown relative link navigation in the Terminal preview panel
  </title>
  <desc id="desc">
    Runweave Terminal with a right-side Markdown Preview showing a project-local
    Markdown link selected and the same panel navigating to the target document.
  </desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="terminal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020617" />
      <stop offset="1" stop-color="#0b1120" />
    </linearGradient>
    <filter id="windowShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow
        dx="0"
        dy="28"
        stdDeviation="26"
        flood-color="#020617"
        flood-opacity="0.62"
      />
    </filter>
    <filter id="calloutShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
        dx="0"
        dy="14"
        stdDeviation="16"
        flood-color="#020617"
        flood-opacity="0.62"
      />
    </filter>
    <style>
      .ui {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      .mono {
        font-family:
          "SFMono-Regular", "JetBrains Mono", Menlo, Consolas, monospace;
      }
      .muted {
        fill: #94a3b8;
      }
      .text {
        fill: #e2e8f0;
      }
    </style>
  </defs>

