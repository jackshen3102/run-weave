version: 1
name: Agent Team Completion Outcome 核心语义
description: >
  验证 skipped observation 不会被自动完成绕过，但可由人工结构化裁决解除阻塞；历史读取保持兼容，
  completion history 在重开后保持可审计。本计划不覆盖第二阶段 follow-up work item。

cases:
  - id: ACO-001
    name: Fresh Skip 保存 Dispatch Observation
    required: true
    description: protocol v1 worker 的结构化 skip 必须保存 outcome、dispatchId、时间和原证据，但旧 status 不变成 pass。
    preconditions:
      - executing Run 有 fresh behavior_verify dispatch。
    steps:
      - 提交 environment skipped outbox；确认 latestObservation=skipped、dispatchId 匹配，status 未计为 pass。

  - id: ACO-002
    name: 自动完成和人工完成共用阻断条件
    required: true
    description: 未裁决的 pending、fail、skipped、review gate、finding、repair、active dispatch 与 final review 必须由同一 evaluator 阻断。
    preconditions:
      - 为每种 blocker 准备隔离 Run fixture。
    steps:
      - 分别推进自动完成并调用 complete API；确认 blocker 集合一致，未进入 done。

  - id: ACO-003
    name: Blocked Complete 零副作用
    required: true
    description: complete 被 acceptance blocker 拒绝时不能先执行 fixture cleanup，也不能写 Run。
    preconditions:
      - need_human Run 含 environment skipped Case，并记录 Run 与 fixture ledger。
    steps:
      - 调用 complete API；确认返回 409、cleanup 调用数为 0、Run 写入数为 0、持久化内容不变。

  - id: ACO-004
    name: 全部通过后才写 Outcome
    required: true
    description: 所有 Case 和 review gate pass、final review 完成、cleanup 归零后才写 succeeded outcome。
    preconditions:
      - Run 只差最后一个 fresh pass，且 cleanup 可成功。
    steps:
      - 提交 pass；确认 cleanup 后 status=done，outcome=succeeded，history 只追加一次。

  - id: ACO-005
    name: 三个读取入口兼容 Legacy Skip 且不落盘
    required: true
    description: 历史 pending+skipped Run 通过三个 Run API 读取时必须投影 skipped，GET 不改写 JSON。
    preconditions:
      - 持久化一份没有 latestObservation/completionOutcome 的历史 Run。
    steps:
      - 调用 listRuns、getRun、getRunByTerminalSession；确认均投影 skipped，store 写入数为 0。

  - id: ACO-006
    name: Done Refresh 保留 Completion History
    required: true
    description: done Run 刷新受影响 Case时清空 current outcome、保留 history，并清空该 Case observation。
    preconditions:
      - 已完成 Run 有一条 completion history。
    steps:
      - 执行 refresh_acceptance；确认 Run 重开为 running，current outcome=null，旧 history 不变，受影响 Case=pending且无 observation。

  - id: ACO-007
    name: 人工确认环境问题后 Run 可完成
    required: true
    description: environment skipped Case 可由人工填写原因并确认跳过，原始 observation 保留且 Run 以 completed_with_exceptions 完成。
    preconditions:
      - need_human Run 只有一个未解决的结构化 environment skipped 产品 Case，其余完成门禁均已满足。
    steps:
      - 使用 $toolkit:playwright-cli 打开真实 Agent Team 面板；确认显示环境 observation、原因和人工裁决入口。
      - 填写原因并点击“确认环境问题并跳过”；确认原始 skipped 证据仍显示，Run 状态变为“已完成 · 有裁决”。

  - id: ACO-008
    name: 不合理 Case 可标记为不适用
    required: true
    description: fail 或非环境 skipped 产品 Case 可由人工标记为不适用，模型观察不变且完成结果带 acceptance disposition exception。
    preconditions:
      - need_human Run 有一个可追溯但被人工确认不适用的未通过产品 Case，其余完成门禁均已满足。
    steps:
      - 使用 $toolkit:playwright-cli 打开真实 Agent Team 面板；填写不适用原因并点击“标记 Case 不适用”。
      - 确认 Case 仍显示原始 fail 或 skipped observation，同时显示人工裁决原因，Run 可以完成但不显示为纯成功。

  - id: ACO-009
    name: 新 Observation 使旧裁决失效
    required: true
    description: 人工裁决只能解除其绑定的 observation；重新执行或 refresh 产生新 observation 后必须重新裁决或取得 pass。
    preconditions:
      - Case 已有一条绑定旧 dispatchId 和 recordedAt 的人工裁决。
    steps:
      - 为同一 Case 写入不同 dispatchId 或 recordedAt 的新 fail/skipped observation；确认旧裁决仍保留在历史中但 evaluator 再次阻断完成。

  - id: ACO-010
    name: 人工裁决解除已解决 Case 的流程阻塞
    required: true
    description: 人工裁决后，已经由 pass 或人工决定解决的 Case 不得再被残留 repair cycle 或关联 framework repair 阻塞，自动流程的其他 blocker 保持不变。
    preconditions:
      - need_human Run 有一个 structure environment skipped Case，并有只关联已通过或待裁决 Case 的 repair cycle 与 blocked framework repair。
    steps:
      - 人工填写原因并确认环境问题；确认原始 skipped observation 保留，相关 repair cycle 被清除，framework repair 留下人工继续记录，Run 可以完成。
