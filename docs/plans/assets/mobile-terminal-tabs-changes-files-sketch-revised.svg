<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Mobile terminal Changes and Files detailed sketch</title>
  <desc id="desc">Detailed readonly Changes and Files mobile tab sketch based on existing preview APIs and App terminal layout.</desc>
  <defs>
