      .muted { font: 500 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9aa8b6; }
      .tab { font: 800 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 500 12px "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace; fill: #cbd5e1; }
    </style>
