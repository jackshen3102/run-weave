<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Runweave Git Submit page-grounded wireframe</title>
  <desc id="desc">Wireframe based on the existing TerminalWorkspaceShell layout: two compact top bars, terminal surface, preview sidecar, and a Git Submit popover.</desc>
  <defs>
    <style>
      .bg { fill: #020617; }
      .panel { fill: #0f172a; }
      .panel2 { fill: #111827; }
      .line { stroke: #1e293b; stroke-width: 1; }
      .line2 { stroke: #334155; stroke-width: 1; }
      .text { fill: #cbd5e1; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; }
      .small { fill: #94a3b8; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; }
      .tiny { fill: #64748b; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 10px; }
      .title { fill: #f8fafc; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 600; }
      .accent { fill: #0284c7; }
      .green { fill: #10b981; }
      .amber { fill: #f59e0b; }
      .button { fill: #0f172a; stroke: #334155; stroke-width: 1; }
      .active { fill: #1e293b; stroke: #0369a1; stroke-width: 1; }
      .popover { fill: #0b1120; stroke: #334155; stroke-width: 1; filter: drop-shadow(0 18px 36px rgba(0,0,0,0.45)); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="900"/>

  <!-- TerminalWorkspaceShell: first compact toolbar, h-8 -->
  <rect class="bg" x="0" y="0" width="1440" height="32"/>
  <line class="line" x1="0" y1="31.5" x2="1440" y2="31.5"/>

  <rect class="button" x="8" y="5" width="24" height="22" rx="5"/>
  <path d="M15 17 L20 12 L25 17 M17 16 V23 H23 V16" fill="none" stroke="#cbd5e1" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect class="button" x="40" y="5" width="132" height="22" rx="5"/>
  <text class="small" x="52" y="20">Local backend</text>
  <path d="M156 13 L161 18 L166 13" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-linecap="round"/>

  <rect class="active" x="184" y="5" width="118" height="22" rx="5"/>
  <text class="small" x="198" y="20">browser-hub</text>
  <circle class="green" cx="289" cy="16" r="3"/>
  <rect class="button" x="308" y="5" width="112" height="22" rx="5"/>
  <text class="small" x="322" y="20">feature</text>
  <rect class="button" x="426" y="5" width="104" height="22" rx="5"/>
  <text class="small" x="440" y="20">docs</text>
  <rect class="button" x="536" y="5" width="24" height="22" rx="5"/>
  <path d="M548 11 V21 M543 16 H553" stroke="#cbd5e1" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Right side tools in the same toolbar -->
  <rect class="active" x="1125" y="5" width="92" height="22" rx="5"/>
  <path d="M1140 11 C1140 16 1149 13 1149 18 C1149 21 1145 22 1142 22 C1138 22 1135 20 1135 17" fill="none" stroke="#bae6fd" stroke-width="1.2" stroke-linecap="round"/>
  <text class="small" x="1158" y="20">Git Submit</text>
  <rect class="button" x="1225" y="5" width="84" height="22" rx="5"/>
  <text class="small" x="1240" y="20">Preview</text>
  <rect class="button" x="1317" y="5" width="24" height="22" rx="5"/>
  <path d="M1324 11 H1334 M1324 16 H1334 M1324 21 H1330" stroke="#cbd5e1" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Second session tab bar, h-[26px] -->
  <rect class="bg" x="0" y="32" width="1440" height="26"/>
  <line class="line" x1="0" y1="57.5" x2="1440" y2="57.5"/>
  <rect class="active" x="0" y="32" width="220" height="26" rx="0"/>
  <text class="small" x="12" y="49">terminal: /Code/browser-hub/feature</text>
  <line x1="0" y1="57" x2="220" y2="57" stroke="#0ea5e9" stroke-width="2"/>
  <rect class="panel" x="220" y="32" width="185" height="26"/>
  <line class="line" x1="220" y1="32" x2="220" y2="58"/>
  <text class="small" x="232" y="49">agent run</text>
  <circle class="amber" cx="393" cy="45" r="3"/>
  <rect class="panel" x="405" y="32" width="40" height="26"/>
  <line class="line" x1="405" y1="32" x2="405" y2="58"/>
  <path d="M425 39 V51 M419 45 H431" stroke="#cbd5e1" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Main split surface -->
  <rect class="bg" x="0" y="58" width="1000" height="842"/>
  <rect class="panel" x="1000" y="58" width="440" height="842"/>
  <line class="line2" x1="1000" y1="58" x2="1000" y2="900"/>

  <!-- Terminal content -->
  <text class="tiny" x="24" y="92">$ git status --short --branch</text>
  <text class="tiny" x="24" y="118">## docs/readme-open-source-refresh...origin/docs/readme-open-source-refresh [ahead 49]</text>
  <text class="tiny" x="24" y="144"> M backend/src/routes/terminal.ts</text>
  <text class="tiny" x="24" y="170"> M frontend/src/components/terminal/terminal-workspace-shell.tsx</text>
  <text class="tiny" x="24" y="196">?? docs/plans/2026-06-02-fast-git-submit.md</text>
  <rect x="24" y="830" width="760" height="28" rx="4" fill="#030712" stroke="#1e293b"/>
  <text class="small" x="38" y="849">rw submit quick --all --message "feat: add fast git submit"</text>

  <!-- Preview sidecar -->
  <rect class="panel2" x="1016" y="74" width="408" height="34" rx="6"/>
  <text class="small" x="1032" y="96">Review Changes</text>
  <rect class="button" x="1328" y="80" width="78" height="22" rx="5"/>
  <text class="tiny" x="1342" y="95">Expand</text>
  <rect class="bg" x="1016" y="124" width="408" height="180" rx="6"/>
  <text class="small" x="1032" y="148">Changed files</text>
  <text class="tiny" x="1032" y="176">backend/src/routes/terminal.ts</text>
  <text class="tiny" x="1032" y="202">frontend/src/components/terminal/terminal-workspace-shell.tsx</text>
  <text class="tiny" x="1032" y="228">packages/runweave-cli/src/commands/submit.ts</text>
  <rect class="bg" x="1016" y="324" width="408" height="520" rx="6"/>
  <text class="tiny" x="1032" y="350">diff --git a/packages/runweave-cli/src/commands/submit.ts</text>
  <text class="tiny" x="1032" y="376">+ export async function runSubmitCommand(...)</text>
  <text class="tiny" x="1032" y="402">+ if (contentEquivalent) resetToUpstream()</text>

  <!-- Git Submit popover anchored to real toolbar position -->
  <path d="M1170 32 L1180 44 L1160 44 Z" fill="#0b1120" stroke="#334155"/>
  <rect class="popover" x="890" y="44" width="420" height="430" rx="8"/>
  <text class="title" x="914" y="78">Git Submit</text>
  <text class="small" x="914" y="101">Run a preauthorized submit command in the active terminal.</text>

  <rect class="active" x="914" y="122" width="70" height="28" rx="6"/>
  <text class="small" x="937" y="141">Quick</text>
  <rect class="button" x="990" y="122" width="78" height="28" rx="6"/>
  <text class="small" x="1007" y="141">Squash</text>
  <rect class="button" x="1074" y="122" width="82" height="28" rx="6"/>
  <text class="small" x="1092" y="141">Clean PR</text>
  <rect class="button" x="1162" y="122" width="118" height="28" rx="6"/>
  <text class="small" x="1184" y="141">Force Lease</text>

  <text class="small" x="914" y="178">Preflight</text>
  <rect class="bg" x="914" y="190" width="372" height="112" rx="6"/>
  <text class="tiny" x="930" y="215">project path</text>
  <text class="small" x="1042" y="215">/Users/bytedance/Code/browser-hub/feature</text>
  <text class="tiny" x="930" y="241">branch</text>
  <text class="small" x="1042" y="241">docs/readme-open-source-refresh</text>
  <text class="tiny" x="930" y="267">upstream</text>
  <text class="small" x="1042" y="267">origin/docs/readme-open-source-refresh</text>
  <text class="tiny" x="930" y="293">strategy</text>
  <text class="small" x="1042" y="293">content check before rebase</text>

  <text class="small" x="914" y="330">Command preview</text>
  <rect class="bg" x="914" y="344" width="372" height="62" rx="6"/>
  <text class="tiny" x="930" y="372">rw submit quick --all --message "feat: add fast git submit"</text>
  <text class="tiny" x="930" y="391"># sends one line to the active terminal</text>

  <rect class="active" x="914" y="424" width="162" height="34" rx="7"/>
  <text class="small" x="945" y="446">Send to Terminal</text>
  <rect class="button" x="1088" y="424" width="84" height="34" rx="7"/>
  <text class="small" x="1117" y="446">Copy</text>
  <rect class="button" x="1184" y="424" width="102" height="34" rx="7"/>
  <text class="small" x="1210" y="446">Dry Run</text>
</svg>
