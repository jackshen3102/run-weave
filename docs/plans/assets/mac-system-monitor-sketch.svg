<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Runweave System Monitor P0 sketch</title>
  <desc id="desc">A CPU and Memory only wireframe for the Runweave macOS System Monitor plan.</desc>
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .ink { stroke: #202327; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #8b929a; stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .teal { stroke: #139a95; fill: none; }
      .teal-fill { fill: #13a39b; }
      .soft { fill: #f2f6f5; stroke: #9aa6a6; stroke-width: 1.4; }
      .panel { fill: #ffffff; stroke: #2b2f33; stroke-width: 2.2; }
      .muted { fill: #6a7178; }
      .text { fill: #202327; font: 22px "Inter", "Helvetica Neue", Arial, sans-serif; }
      .small { fill: #202327; font: 17px "Inter", "Helvetica Neue", Arial, sans-serif; }
      .tiny { fill: #202327; font: 14px "Inter", "Helvetica Neue", Arial, sans-serif; }
      .label { fill: #5d666e; font: 15px "Inter", "Helvetica Neue", Arial, sans-serif; }
      .mono { fill: #202327; font: 15px "SFMono-Regular", Menlo, Consolas, monospace; }
      .h1 { fill: #202327; font: 42px "Inter", "Helvetica Neue", Arial, sans-serif; font-weight: 700; }
      .h2 { fill: #202327; font: 24px "Inter", "Helvetica Neue", Arial, sans-serif; font-weight: 700; }
    </style>
  </defs>
  <rect class="bg" width="1672" height="941"/>

  <g transform="translate(32 38)">
    <text class="h1" x="0" y="0" dominant-baseline="hanging"># Runweave</text>
    <text class="h2 muted" x="82" y="58">System Monitor</text>
    <path class="teal" stroke-width="4" d="M82 92 C160 83 241 84 323 90"/>
  </g>

  <g transform="translate(24 174)">
    <text class="h2" x="0" y="-34">1) Menu</text>
    <rect class="panel" x="0" y="0" width="366" height="196" rx="10"/>
    <rect class="soft" x="0" y="0" width="366" height="32" rx="10"/>
    <text class="small" x="18" y="22">Runweave</text>
    <text class="small" x="116" y="22">File</text>
    <rect class="soft" x="158" y="5" width="54" height="26" rx="7"/>
    <text class="small" x="168" y="23">View</text>
    <text class="small" x="226" y="22">Window</text>
    <text class="small" x="304" y="22">Help</text>
    <rect class="panel" x="160" y="32" width="188" height="150" rx="8"/>
    <text class="small" x="178" y="61">Dashboard</text>
    <text class="small" x="178" y="96">Logs</text>
    <rect class="teal-fill" x="170" y="112" width="168" height="32" rx="5" opacity="0.95"/>
    <text class="small" x="184" y="134" fill="#fff">System Monitor</text>
    <text class="small" x="178" y="169">Toggle DevTools</text>
    <path class="teal" stroke-width="3" d="M25 94 C80 88 102 89 136 119"/>
    <text class="small" x="18" y="92" fill="#139a95">View &gt;</text>
  </g>

  <g transform="translate(24 466)">
    <text class="h2" x="0" y="-34">2) Tray</text>
    <rect class="panel" x="0" y="0" width="366" height="204" rx="10"/>
    <rect class="soft" x="0" y="0" width="366" height="34" rx="10"/>
    <text class="small" x="66" y="23">#</text>
    <text class="small" x="112" y="23">wifi</text>
    <text class="small" x="158" y="23">55%</text>
    <text class="small" x="246" y="23">Mon 10:42 AM</text>
    <rect class="panel" x="142" y="46" width="204" height="140" rx="8"/>
    <text class="small" x="160" y="76">Open Runweave</text>
    <rect class="teal-fill" x="153" y="92" width="182" height="33" rx="5" opacity="0.95"/>
    <text class="small" x="168" y="114" fill="#fff">Open System Monitor</text>
    <text class="small" x="160" y="150">Preferences...</text>
    <path class="thin" d="M158 162 H329"/>
    <text class="small" x="160" y="181">Quit Runweave</text>
    <path class="teal" stroke-width="3" d="M26 105 C77 88 105 92 130 111"/>
    <text class="small" x="18" y="111" fill="#139a95">Tray &gt;</text>
  </g>

  <g transform="translate(420 24)">
    <rect class="panel" x="0" y="0" width="956" height="626" rx="18"/>
    <circle cx="32" cy="30" r="8" fill="#ff6b64" stroke="#202327"/>
    <circle cx="62" cy="30" r="8" fill="#ffc857" stroke="#202327"/>
    <circle cx="92" cy="30" r="8" fill="#6ecb63" stroke="#202327"/>
    <text class="h2" x="407" y="33">System Monitor</text>
    <rect class="panel" x="690" y="17" width="86" height="38" rx="7"/>
    <text class="text" x="714" y="44">5s</text>
    <rect class="panel" x="806" y="17" width="42" height="38" rx="7"/>
    <text class="text" x="818" y="44">II</text>
    <rect class="panel" x="875" y="17" width="42" height="38" rx="7"/>
    <text class="text" x="887" y="44">R</text>

    <g transform="translate(24 78)">
      <rect class="panel" x="0" y="0" width="220" height="112" rx="8"/>
      <text class="text" x="20" y="32">CPU</text>
      <text class="h2" x="150" y="72">47%</text>
      <text class="label" x="148" y="95">10 cores</text>
      <g transform="translate(22 62)">
        <rect x="0" y="22" width="7" height="24" fill="#d8ddde" stroke="#8b929a"/>
        <rect x="13" y="10" width="7" height="36" fill="#d8ddde" stroke="#8b929a"/>
        <rect x="26" y="2" width="7" height="44" fill="#d8ddde" stroke="#8b929a"/>
        <rect x="39" y="16" width="7" height="30" fill="#d8ddde" stroke="#8b929a"/>
        <rect x="52" y="7" width="7" height="39" fill="#d8ddde" stroke="#8b929a"/>
        <rect x="65" y="18" width="7" height="28" fill="#d8ddde" stroke="#8b929a"/>
        <rect x="78" y="12" width="7" height="34" class="teal-fill"/>
        <rect x="91" y="0" width="7" height="46" class="teal-fill"/>
      </g>
    </g>

    <g transform="translate(264 78)">
      <rect class="panel" x="0" y="0" width="220" height="112" rx="8"/>
      <text class="text" x="20" y="32">Memory</text>
      <text class="h2" x="148" y="72">62%</text>
      <text class="label" x="18" y="94">24.8 / 40 GB · WARN</text>
      <path class="thin" d="M20 72 H122"/>
      <path class="teal" stroke-width="8" d="M20 72 H84"/>
    </g>

    <g transform="translate(504 78)">
      <rect class="panel" x="0" y="0" width="220" height="112" rx="8"/>
      <text class="text" x="20" y="32">Swap</text>
      <text class="h2" x="132" y="72">1.2 GB</text>
      <path class="thin" d="M20 78 H110"/>
    </g>

    <g transform="translate(744 78)">
      <rect class="panel" x="0" y="0" width="188" height="112" rx="8"/>
      <text class="text" x="20" y="32">Battery</text>
      <rect class="thin" x="22" y="56" width="74" height="36" rx="4"/>
      <rect class="teal-fill" x="28" y="62" width="44" height="24" opacity="0.85"/>
      <text class="h2" x="116" y="72">56%</text>
      <text class="label" x="118" y="94">charging</text>
    </g>

    <g transform="translate(260 210)">
      <rect class="panel" x="0" y="0" width="420" height="38" rx="8"/>
      <rect class="teal-fill" x="2" y="2" width="208" height="34" rx="7" opacity="0.16"/>
      <path class="teal" stroke-width="2.6" d="M210 0 V38"/>
      <text class="text" x="82" y="27">CPU</text>
      <text class="text" x="284" y="27">Memory</text>
    </g>

    <text class="h2" x="26" y="276">Top Apps</text>
    <g transform="translate(24 296)">
      <rect class="panel" x="0" y="0" width="908" height="294" rx="4"/>
      <text class="small" x="18" y="28">App</text>
      <text class="small" x="354" y="28">CPU</text>
      <text class="small" x="490" y="28">Memory</text>
      <text class="small" x="688" y="28">Procs</text>
      <path class="thin" d="M0 40 H908"/>
      <text class="small" x="18" y="72">Chrome</text>
      <text class="small" x="354" y="72">184.2%</text>
      <text class="small" x="490" y="72">6.4 GB</text>
      <text class="small" x="704" y="72">27</text>
      <text class="small" x="842" y="72">&gt;</text>
      <path class="thin" d="M0 88 H908"/>
      <text class="small" x="18" y="120">VS Code</text>
      <text class="small" x="354" y="120">92.1%</text>
      <text class="small" x="490" y="120">3.1 GB</text>
      <text class="small" x="704" y="120">14</text>
      <text class="small" x="842" y="120">&gt;</text>
      <path class="thin" d="M0 136 H908"/>
      <rect class="teal-fill" x="0" y="136" width="908" height="43" opacity="0.12"/>
      <text class="small" x="18" y="164"># Runweave</text>
      <text class="small" x="354" y="164">12.4%</text>
      <text class="small" x="490" y="164">780 MB</text>
      <text class="small" x="704" y="164">4</text>
      <text class="small" x="842" y="164">v</text>
      <path class="thin" d="M42 188 V246 M42 188 H80 M42 218 H80 M42 246 H80"/>
      <text class="small" x="90" y="196">runweave main</text>
      <text class="small" x="354" y="196">2.4%</text>
      <text class="small" x="490" y="196">256 MB</text>
      <text class="small" x="90" y="226">runweave renderer</text>
      <text class="small" x="354" y="226">2.1%</text>
      <text class="small" x="490" y="226">178 MB</text>
      <text class="small" x="90" y="256">runweave gpu</text>
      <text class="small" x="354" y="256">0.7%</text>
      <text class="small" x="490" y="256">78 MB</text>
      <path class="thin" d="M0 266 H908"/>
      <text class="small" x="18" y="288">Slack</text>
      <text class="small" x="354" y="288">8.7%</text>
      <text class="small" x="490" y="288">1.2 GB</text>
      <text class="small" x="704" y="288">3</text>
    </g>
  </g>

  <g transform="translate(1490 496)">
    <rect x="0" y="0" width="148" height="150" rx="14" fill="#fbfbf8" stroke="#139a95" stroke-width="2" stroke-dasharray="12 10"/>
    <text class="small" x="28" y="40">macOS only</text>
    <text class="small" x="34" y="72">no sudo</text>
    <text class="small" x="28" y="104">read-only</text>
    <rect class="soft" x="49" y="118" width="50" height="30" rx="6"/>
    <text class="small" x="63" y="140" fill="#139a95">P0</text>
  </g>

  <g transform="translate(214 688)">
    <text class="h2" x="-188" y="-14">3) Architecture</text>
    <rect class="panel" x="0" y="0" width="718" height="220" rx="16"/>
    <text class="h2" x="208" y="34">Electron Main</text>
    <g transform="translate(28 58)">
      <rect class="panel" x="0" y="0" width="216" height="138" rx="9"/>
      <text class="small" x="38" y="28">Collect metrics</text>
      <text class="mono" x="22" y="62">ps -axo ...</text>
      <text class="mono" x="22" y="86">os.cpus delta</text>
      <text class="mono" x="22" y="110">vm_stat</text>
      <text class="mono" x="22" y="134">pmset / ioreg</text>
    </g>
    <path class="ink" d="M260 128 H304"/>
    <path class="ink" d="M298 122 L306 128 L298 134"/>
    <g transform="translate(320 58)">
      <rect class="panel" x="0" y="0" width="160" height="138" rx="9"/>
      <text class="small" x="30" y="30">Aggregate</text>
      <text class="small" x="44" y="54">by app</text>
      <text class="tiny" x="24" y="86">sum CPU</text>
      <text class="tiny" x="24" y="110">sum memory</text>
      <text class="tiny" x="24" y="134">pids</text>
    </g>
    <path class="ink" d="M496 128 H540"/>
    <path class="ink" d="M534 122 L542 128 L534 134"/>
    <g transform="translate(558 58)">
      <rect class="panel" x="0" y="0" width="132" height="138" rx="9"/>
      <text class="small" x="20" y="30">Snapshot</text>
      <text class="tiny" x="20" y="62">overview</text>
      <text class="tiny" x="20" y="86">top apps</text>
      <text class="tiny" x="20" y="110">children</text>
      <text class="tiny" x="20" y="134">timestamp</text>
    </g>
  </g>

  <g transform="translate(934 790)">
    <path class="teal" stroke-width="5" d="M0 0 H176"/>
    <path class="teal" stroke-width="5" d="M162 -12 L178 0 L162 12"/>
    <text class="h2" x="22" y="-30" fill="#139a95">IPC invoke</text>
    <text class="small" x="34" y="32" fill="#139a95">+ contextBridge</text>
  </g>

  <g transform="translate(1138 688)">
    <rect class="panel" x="0" y="0" width="496" height="220" rx="16"/>
    <text class="h2" x="164" y="34">Renderer</text>
    <g transform="translate(28 58)">
      <rect class="panel" x="0" y="0" width="176" height="138" rx="9"/>
      <text class="small" x="18" y="30">useSystemMonitor</text>
      <text class="tiny" x="24" y="62">poll every 5s</text>
      <text class="tiny" x="24" y="86">receive snapshot</text>
      <text class="tiny" x="24" y="110">keep 12 frames</text>
      <text class="tiny" x="24" y="134">derive sort</text>
    </g>
    <path class="ink" d="M224 128 H270"/>
    <path class="ink" d="M264 122 L272 128 L264 134"/>
    <g transform="translate(288 58)">
      <rect class="panel" x="0" y="0" width="176" height="138" rx="9"/>
      <text class="small" x="22" y="30">Monitor UI</text>
      <text class="tiny" x="24" y="62">overview bars</text>
      <text class="tiny" x="24" y="86">CPU / Memory</text>
      <text class="tiny" x="24" y="110">top apps table</text>
      <text class="tiny" x="24" y="134">expand rows</text>
    </g>
  </g>
</svg>
