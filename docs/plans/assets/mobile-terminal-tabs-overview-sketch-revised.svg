<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">Mobile terminal detail tabs overview sketch</title>
  <desc id="desc">Code-grounded mobile sketch for the App terminal detail page with Chat, Changes, and Files tabs.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
      .label { font: 700 24px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .note { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
      .phone-title { font: 800 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #eef3f8; }
      .phone-subtitle { font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9aa8b6; }
      .tiny { font: 600 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94a3b8; }
      .tab { font: 800 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 500 12px "SFMono-Regular", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #cbd5e1; }
      .body-text { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #dbe6f2; }
      .muted-text { font: 500 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9aa8b6; }
    </style>
  </defs>

  <rect width="1600" height="960" fill="#f5f7fb"/>
  <text x="80" y="74" class="label">App Terminal Detail Tabs - overview grounded in current code</text>
  <text x="80" y="106" class="note">Current page shell: Header + terminal renderer + TerminalCommandComposer. Proposed tabs add readonly Changes and Files without extra chat actions.</text>

  <g transform="translate(94 150)">
    <text x="0" y="0" class="label">Chat tab</text>
    <text x="0" y="26" class="note">Existing terminal surface and composer remain intact.</text>
    <g transform="translate(0 54)" filter="url(#shadow)">
      <rect x="0" y="0" width="420" height="700" rx="38" fill="#05070b"/>
      <rect x="18" y="18" width="384" height="664" rx="28" fill="#05070b"/>
      <rect x="18" y="18" width="384" height="92" rx="28" fill="#0c1118"/>
      <rect x="18" y="78" width="384" height="32" fill="#0c1118"/>
      <text x="43" y="72" fill="#dce5ee" font-size="28" font-family="Inter, sans-serif">‹</text>
      <text x="87" y="55" class="phone-title">codex</text>
      <text x="87" y="77" class="phone-subtitle">.../browser-hub/feature</text>
      <circle cx="91" cy="96" r="3.5" fill="#42d986"/>
      <text x="101" y="100" class="tiny">Connected · 2m ago</text>
      <text x="354" y="72" fill="#dce5ee" font-size="20" font-family="Inter, sans-serif">↻</text>

      <rect x="18" y="110" width="384" height="402" fill="#0b1220"/>
      <g transform="translate(34 132)">
        <text class="mono" x="0" y="0">$ pnpm app:dev</text>
        <text class="mono" x="0" y="26">VITE ready in 438 ms</text>
        <text class="mono" x="0" y="52">backend listening on :5001</text>
        <text class="mono" x="0" y="104">› Implementing mobile tabs...</text>
        <text class="mono" x="0" y="130">› Terminal output keeps streaming</text>
        <text class="mono" x="0" y="156">› Renderer stays mounted across tabs</text>
      </g>

      <rect x="18" y="512" width="384" height="98" fill="#0c1118" opacity="0.96"/>
      <rect x="34" y="536" width="44" height="44" rx="22" fill="#273142"/>
      <text x="47" y="565" fill="#eef3f8" font-size="20" font-family="Inter, sans-serif">▧</text>
      <rect x="88" y="536" width="218" height="44" rx="22" fill="#151c27" stroke="#354155"/>
      <text x="105" y="563" class="muted-text">Type a command...</text>
      <rect x="320" y="536" width="44" height="44" rx="22" fill="#eef3f8"/>
      <text x="334" y="564" fill="#05070b" font-size="19" font-family="Inter, sans-serif">↑</text>

      <rect x="18" y="610" width="384" height="72" fill="#080d14"/>
      <rect x="36" y="625" width="104" height="38" rx="19" fill="#eef3f8"/>
      <text x="69" y="650" class="tab" fill="#05070b">Chat</text>
      <text x="174" y="650" class="tab" fill="#94a3b8">Changes</text>
      <text x="302" y="650" class="tab" fill="#94a3b8">Files</text>
    </g>
  </g>

  <g transform="translate(590 150)">
    <text x="0" y="0" class="label">Changes tab</text>
    <text x="0" y="26" class="note">Readonly git changes and diff. No explain or fix prompt.</text>
    <g transform="translate(0 54)" filter="url(#shadow)">
      <rect x="0" y="0" width="420" height="700" rx="38" fill="#05070b"/>
      <rect x="18" y="18" width="384" height="664" rx="28" fill="#05070b"/>
      <rect x="18" y="18" width="384" height="92" rx="28" fill="#0c1118"/>
      <text x="43" y="72" fill="#dce5ee" font-size="28" font-family="Inter, sans-serif">‹</text>
      <text x="87" y="55" class="phone-title">codex</text>
      <text x="87" y="77" class="phone-subtitle">.../browser-hub/feature</text>
      <circle cx="91" cy="96" r="3.5" fill="#42d986"/>
      <text x="101" y="100" class="tiny">Connected · renderer hidden</text>
      <text x="354" y="72" fill="#dce5ee" font-size="20" font-family="Inter, sans-serif">↻</text>

      <rect x="18" y="110" width="384" height="500" fill="#0b1220"/>
      <text x="36" y="145" class="phone-title">Changes</text>
      <text x="310" y="145" class="tiny">Refresh</text>
      <rect x="36" y="164" width="90" height="34" rx="17" fill="#eef3f8"/>
      <text x="68" y="186" class="tab" fill="#05070b">All</text>
      <rect x="136" y="164" width="92" height="34" rx="17" fill="#172033" stroke="#2d3a4d"/>
      <text x="159" y="186" class="tab" fill="#94a3b8">Staged</text>
      <rect x="238" y="164" width="96" height="34" rx="17" fill="#172033" stroke="#2d3a4d"/>
      <text x="259" y="186" class="tab" fill="#94a3b8">Working</text>
      <g transform="translate(36 220)">
        <rect width="332" height="64" rx="12" fill="#111827" stroke="#263449"/>
        <rect x="14" y="19" width="28" height="26" rx="7" fill="#264f3b"/>
        <text x="23" y="37" class="tab" fill="#7ee6a4">M</text>
        <text x="54" y="29" class="body-text">app/src/pages</text>
        <text x="54" y="50" class="muted-text">AppTerminalPage.tsx · working</text>
        <rect y="78" width="332" height="64" rx="12" fill="#111827" stroke="#263449"/>
        <rect x="14" y="97" width="28" height="26" rx="7" fill="#2e405f"/>
        <text x="23" y="115" class="tab" fill="#9fc2ff">A</text>
        <text x="54" y="107" class="body-text">app/src/components</text>
        <text x="54" y="128" class="muted-text">TerminalDetailTabBar.tsx · staged</text>
        <rect y="156" width="332" height="146" rx="12" fill="#0f172a" stroke="#334155"/>
        <text x="16" y="184" class="body-text">MobileDiffView.tsx</text>
        <text x="250" y="184" class="muted-text">Diff</text>
        <text x="16" y="214" class="mono" fill="#7ee6a4">+ activeTab: "changes"</text>
        <text x="16" y="238" class="mono" fill="#ffb4a8">- context composer</text>
        <text x="16" y="262" class="mono">  readonly preview only</text>
      </g>

      <rect x="18" y="610" width="384" height="72" fill="#080d14"/>
      <text x="70" y="650" class="tab" fill="#94a3b8">Chat</text>
      <rect x="150" y="625" width="120" height="38" rx="19" fill="#eef3f8"/>
      <text x="174" y="650" class="tab" fill="#05070b">Changes</text>
      <text x="314" y="650" class="tab" fill="#94a3b8">Files</text>
    </g>
  </g>

  <g transform="translate(1086 150)">
    <text x="0" y="0" class="label">Files tab</text>
    <text x="0" y="26" class="note">Readonly file search, browse, and preview drawer.</text>
    <g transform="translate(0 54)" filter="url(#shadow)">
      <rect x="0" y="0" width="420" height="700" rx="38" fill="#05070b"/>
      <rect x="18" y="18" width="384" height="664" rx="28" fill="#05070b"/>
      <rect x="18" y="18" width="384" height="92" rx="28" fill="#0c1118"/>
      <text x="43" y="72" fill="#dce5ee" font-size="28" font-family="Inter, sans-serif">‹</text>
      <text x="87" y="55" class="phone-title">codex</text>
      <text x="87" y="77" class="phone-subtitle">.../browser-hub/feature</text>
      <circle cx="91" cy="96" r="3.5" fill="#42d986"/>
      <text x="101" y="100" class="tiny">Connected · renderer hidden</text>
      <text x="354" y="72" fill="#dce5ee" font-size="20" font-family="Inter, sans-serif">↻</text>

      <rect x="18" y="110" width="384" height="500" fill="#0b1220"/>
      <text x="36" y="145" class="phone-title">Files</text>
      <rect x="36" y="164" width="332" height="42" rx="12" fill="#111827" stroke="#334155"/>
      <text x="54" y="190" class="muted-text">Search files</text>
      <text x="36" y="232" class="tiny">/ app / src</text>
      <g transform="translate(36 254)">
        <rect width="332" height="48" rx="10" fill="#111827" stroke="#263449"/>
        <text x="16" y="30" class="body-text">⌃  ..</text>
        <rect y="58" width="332" height="48" rx="10" fill="#111827" stroke="#263449"/>
        <text x="16" y="88" class="body-text">› components</text>
        <rect y="116" width="332" height="48" rx="10" fill="#111827" stroke="#263449"/>
        <text x="16" y="146" class="body-text">› pages</text>
        <rect y="174" width="332" height="58" rx="10" fill="#111827" stroke="#263449"/>
        <rect x="14" y="191" width="34" height="24" rx="7" fill="#263449"/>
        <text x="21" y="208" class="tiny">tsx</text>
        <text x="60" y="199" class="body-text">AppTerminalPage.tsx</text>
        <text x="60" y="220" class="muted-text">modified</text>
        <rect y="240" width="332" height="104" rx="16" fill="#162033" stroke="#475569"/>
        <text x="18" y="268" class="body-text">Preview drawer</text>
        <text x="18" y="292" class="muted-text">readonly · 18 KB</text>
        <text x="18" y="320" class="mono">import { TerminalCommandComposer }</text>
      </g>

      <rect x="18" y="610" width="384" height="72" fill="#080d14"/>
      <text x="70" y="650" class="tab" fill="#94a3b8">Chat</text>
      <text x="174" y="650" class="tab" fill="#94a3b8">Changes</text>
      <rect x="286" y="625" width="88" height="38" rx="19" fill="#eef3f8"/>
      <text x="314" y="650" class="tab" fill="#05070b">Files</text>
    </g>
