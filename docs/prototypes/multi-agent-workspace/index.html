<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Runweave Multi-Agent Workspace Prototype</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --surface: #050816;
        --surface-2: #07111f;
        --surface-3: #0b1220;
        --line: #1e293b;
        --line-strong: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --dim: #64748b;
        --cyan: #22d3ee;
        --cyan-weak: rgba(34, 211, 238, 0.14);
        --green: #34d399;
        --amber: #fbbf24;
        --danger: #fb7185;
        --radius: 7px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 1180px;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      button {
        border: 0;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }

      .app {
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
      }

      /* ---- row 1: project tabs (mirrors real terminal-workspace-shell top toolbar) ---- */
      .project-bar {
        flex: none;
        height: 34px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 8px;
        background: var(--bg);
        border-bottom: 1px solid var(--line);
      }

      .home-button {
        flex: none;
        width: 26px;
        height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
      }

      .home-button:hover { background: var(--surface-3); color: #e2e8f0; }

      .bar-divider {
        flex: none;
        width: 1px;
        height: 18px;
        background: var(--line);
        margin: 0 2px;
      }

      .project-tabs {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 4px;
        overflow: hidden;
      }

      .project-tab {
        height: 24px;
        max-width: 180px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(15, 23, 42, 0.9);
        color: #e2e8f0;
        font-size: 12px;
      }

      .project-tab.active {
        border-color: rgba(3, 105, 161, 0.7);
        background: var(--surface-3);
        color: #f8fafc;
        box-shadow: inset 0 1px 0 rgba(148, 163, 184, 0.18);
      }

      .project-name {
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .add-project {
        flex: none;
        height: 24px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
      }

      .add-project:hover { border-color: var(--cyan); color: #ecfeff; }

      /* ---- row 2: terminal tabs (each terminal = one run) ---- */
      .terminal-bar {
        flex: none;
        height: 27px;
        display: flex;
        align-items: stretch;
        background: var(--bg);
        border-bottom: 1px solid var(--line);
      }

      .terminal-tabs {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: stretch;
        overflow: hidden;
      }

      .terminal-tab {
        position: relative;
        max-width: 240px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px 0 10px;
        border-right: 1px solid var(--line);
        background: transparent;
        color: #cbd5e1;
        font-size: 12px;
      }

      .terminal-tab:hover { background: rgba(15, 23, 42, 0.45); }

      .terminal-tab.active {
        background: rgba(15, 23, 42, 0.35);
        color: #f8fafc;
      }

      .terminal-tab.active::before {
        content: "";
        position: absolute;
        inset-inline: 0;
        bottom: 0;
        height: 2px;
        background: #0ea5e9;
      }

      .terminal-name {
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .term-status-dot {
        width: 7px;
        height: 7px;
        flex: none;
        border-radius: 50%;
        background: var(--dim);
      }

      .term-status-dot.running { background: var(--green); box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.1); }
      .term-status-dot.need_human { background: var(--amber); box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.12); }
      .term-status-dot.clarifying { background: var(--cyan); box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1); }
      .term-status-dot.idle { background: transparent; border: 1px solid var(--line-strong); }

      .term-flow-tag {
        flex: none;
        padding: 1px 6px;
        border-radius: 4px;
        border: 1px solid rgba(34, 211, 238, 0.35);
        background: var(--cyan-weak);
        color: #cffafe;
        font:
          10px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .add-terminal {
        flex: none;
        width: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-right: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        font-size: 15px;
      }

      .add-terminal:hover { color: #ecfeff; background: rgba(15, 23, 42, 0.45); }

      /* ---- workspace: terminal-dominant left + weakened sidecar right ---- */
      .workspace {
        min-height: 0;
        flex: 1;
        display: flex;
      }

      .terminal-region {
        min-width: 0;
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-right: 1px solid var(--line);
      }

      .terminal-toolbar {
        flex: none;
        height: 38px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        border-bottom: 1px solid var(--line);
        background: rgba(2, 6, 23, 0.96);
      }

      .session-name {
        flex: none;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: #f8fafc;
        font-size: 13px;
      }

      .panel-chips {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        overflow: hidden;
      }

      .panel-chip {
        height: 26px;
        max-width: 160px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #07111f;
        color: #cbd5e1;
      }

      .panel-chip.active {
        border-color: rgba(34, 211, 238, 0.72);
        background: rgba(8, 47, 73, 0.48);
        color: #f8fafc;
      }

      .chip-name {
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .pane-id {
        color: var(--dim);
        font:
          11px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .toolbar-button {
        flex: none;
        height: 28px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #0f172a;
        color: #dbeafe;
      }

      .toolbar-button:hover { border-color: var(--cyan); }

      .role-dot {
        width: 7px;
        height: 7px;
        flex: none;
        border-radius: 50%;
        background: var(--green);
      }

      .role-dot.main { background: var(--cyan); }
      .role-dot.code { background: var(--green); }
      .role-dot.code_review { background: var(--amber); }

      .tmux-canvas {
        min-height: 0;
        flex: 1;
        display: flex;
        margin: 10px;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        background: #020617;
        overflow: hidden;
      }

      .tmux-split {
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        display: flex;
      }

      .tmux-split.vertical { flex-direction: column; }
      .tmux-split.horizontal { flex-direction: row; }

      .split-child {
        min-width: 0;
        min-height: 0;
        display: flex;
      }

      .split-divider {
        flex: none;
        width: 1px;
        background: var(--line-strong);
      }

      .tmux-split.vertical > .split-divider {
        width: auto;
        height: 1px;
      }

      .tmux-pane {
        min-width: 0;
        min-height: 0;
        flex: 1;
        width: 100%;
        position: relative;
        display: flex;
        flex-direction: column;
        padding: 0;
        border: 0;
        background: #020617;
        color: #dbeafe;
        text-align: left;
        overflow: hidden;
      }

      .tmux-pane.active {
        box-shadow: inset 0 0 0 2px rgba(34, 211, 238, 0.8);
      }

      .tmux-pane:hover { background: #030b18; }

      .pane-overlay {
        position: absolute;
        top: 7px;
        right: 8px;
        z-index: 2;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 3px 7px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 5px;
        background: rgba(2, 6, 23, 0.84);
        color: #cbd5e1;
        font:
          11px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .tmux-pane.active .pane-overlay {
        border-color: rgba(34, 211, 238, 0.65);
        color: #ecfeff;
      }

      .terminal-output {
        min-height: 0;
        flex: 1;
        overflow: hidden;
        padding: 14px 12px;
        font:
          13px/1.56 "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        color: #dbeafe;
      }

      .terminal-line {
        min-height: 20px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .cursor {
        display: inline-block;
        width: 8px;
        height: 15px;
        margin-left: 2px;
        background: #e2e8f0;
        vertical-align: -2px;
      }

      /* ---- weakened observation sidecar (right) ---- */
      .sidecar {
        width: 300px;
        flex: none;
        display: flex;
        flex-direction: column;
        background: rgba(2, 6, 23, 0.72);
      }

      .sidecar-header {
        flex: none;
        height: 38px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
      }

      .observe-badge {
        margin-left: auto;
        padding: 2px 7px;
        border: 1px solid var(--line-strong);
        border-radius: 5px;
        color: var(--dim);
        font-size: 10px;
        letter-spacing: 0.04em;
      }

      /* plain-terminal sidecar: start engineering-rules flow */
      .start-flow-section {
        min-height: 0;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 14px;
        padding: 20px 16px;
      }

      .start-flow-title {
        font-size: 13px;
        font-weight: 600;
        color: #e2e8f0;
      }

      .start-flow-desc {
        margin: 0;
        font-size: 12px;
        line-height: 1.6;
        color: var(--muted);
      }

      .start-flow-desc code {
        padding: 1px 5px;
        border-radius: 4px;
        background: var(--surface-3);
        color: #cffafe;
        font:
          11px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .start-flow-steps {
        margin: 0;
        padding-left: 18px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        color: var(--dim);
        font-size: 12px;
        line-height: 1.5;
      }

      .start-flow-section .primary-button {
        flex: none;
        height: auto;
        min-height: 34px;
        padding: 8px 12px;
        line-height: 1.4;
      }

      .sidecar-section {
        flex: none;
        padding: 12px;
        border-bottom: 1px solid var(--line);
      }

      .sidecar-section h3 {
        margin: 0 0 9px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--dim);
      }

      /* composable flow: toggleable stages */
      .flow-list {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .flow-stage {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 6px 9px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface-2);
        color: var(--muted);
        text-align: left;
      }

      .flow-stage.enabled { color: #e2e8f0; }
      .flow-stage.disabled { opacity: 0.42; }

      .flow-stage.current {
        border-color: rgba(34, 211, 238, 0.72);
        background: var(--cyan-weak);
        color: #ecfeff;
      }

      .flow-toggle {
        width: 26px;
        height: 15px;
        flex: none;
        border-radius: 999px;
        background: #1e293b;
        position: relative;
        transition: background 0.12s;
      }

      .flow-stage.enabled .flow-toggle { background: rgba(34, 211, 238, 0.55); }

      .flow-toggle::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #e2e8f0;
        transition: transform 0.12s;
      }

      .flow-stage.enabled .flow-toggle::after { transform: translateX(11px); }

      .flow-label { flex: 1; min-width: 0; font-size: 12px; }

      .flow-short {
        flex: none;
        font:
          10px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        color: var(--dim);
      }

      .flow-hint {
        margin: 8px 0 0;
        font-size: 11px;
        line-height: 1.5;
        color: var(--dim);
      }

      /* log feed */
      .log-section {
        min-height: 0;
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 12px;
      }

      .log-body {
        min-height: 0;
        flex: 1;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .log-line {
        padding: 7px 9px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        color: #cbd5e1;
        font:
          12px/1.5 "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      /* loop status (executing phase observe panel) */
      .observe-section {
        min-height: 0;
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 12px;
        overflow: auto;
      }

      .loop-bar {
        display: flex;
        flex-direction: column;
        gap: 7px;
        padding: 11px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-2);
      }

      .loop-bar.warn { border-color: rgba(251, 191, 36, 0.5); }
      .loop-bar.escalated { border-color: rgba(251, 113, 133, 0.6); background: rgba(251, 113, 133, 0.08); }

      .loop-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .loop-label { color: var(--muted); font-size: 12px; }

      .loop-value {
        color: #e2e8f0;
        font:
          12px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .loop-track {
        display: flex;
        gap: 5px;
        margin-top: 2px;
      }

      .loop-pip {
        flex: 1;
        height: 6px;
        border-radius: 999px;
        background: #1e293b;
      }

      .loop-pip.filled { background: var(--green); }
      .loop-pip.filled.warn { background: var(--amber); }
      .loop-pip.filled.escalated { background: var(--danger); }

      .loop-sim {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .loop-sim-hint { color: var(--dim); font-size: 11px; }

      .loop-sim-actions {
        display: flex;
        gap: 8px;
      }

      .loop-sim-btn {
        flex: 1;
        height: 30px;
        border-radius: 7px;
        border: 1px dashed var(--line-strong);
        background: transparent;
        font-size: 12px;
      }

      .loop-sim-btn.ok { color: #bbf7d0; border-color: rgba(52, 211, 153, 0.45); }
      .loop-sim-btn.ok:hover { background: rgba(52, 211, 153, 0.12); }
      .loop-sim-btn.bad { color: #fecaca; border-color: rgba(251, 113, 133, 0.45); }
      .loop-sim-btn.bad:hover { background: rgba(251, 113, 133, 0.12); }

      .loop-sim-note { margin: 0; color: var(--dim); font-size: 11px; line-height: 1.5; }

      .escalation-card {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid rgba(251, 113, 133, 0.55);
        border-radius: 8px;
        background: rgba(251, 113, 133, 0.08);
      }

      .escalation-card strong { color: #fecdd3; font-size: 13px; }

      .escalation-card p {
        margin: 8px 0 12px;
        color: #e2e8f0;
        font-size: 12px;
        line-height: 1.55;
      }

      /* acceptance draft (proposal phase) */
      .acceptance-draft {
        margin-top: 14px;
        padding: 11px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-2);
      }

      .acceptance-hint {
        margin: 0 0 8px;
        color: var(--dim);
        font-size: 11px;
        line-height: 1.5;
      }

      .acceptance-list {
        margin: 0;
        padding-left: 18px;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .acceptance-list li {
        color: #e2e8f0;
        font-size: 12px;
        line-height: 1.5;
      }

      /* acceptance evidence (executing phase) */
      .acceptance-tally {
        margin-left: auto;
        color: var(--green);
        font:
          12px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .acceptance-tally .fail-count { color: var(--danger); margin-left: 6px; }

      .evidence-card {
        display: flex;
        gap: 9px;
        padding: 9px 10px;
        margin-bottom: 7px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface-2);
      }

      .evidence-card.fail { border-color: rgba(251, 113, 133, 0.5); background: rgba(251, 113, 133, 0.07); }

      .evidence-mark {
        flex: none;
        width: 18px;
        height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 11px;
        font-weight: 700;
      }

      .evidence-mark.pass { background: rgba(52, 211, 153, 0.16); color: #6ee7b7; }
      .evidence-mark.fail { background: rgba(251, 113, 133, 0.16); color: #fda4af; }

      .evidence-body { min-width: 0; flex: 1; }

      .evidence-text { color: #e2e8f0; font-size: 12px; line-height: 1.45; }

      .evidence-meta {
        margin-top: 3px;
        color: var(--dim);
        font:
          11px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        word-break: break-word;
      }

      .evidence-bounce {
        margin-top: 5px;
        color: #fda4af;
        font-size: 11px;
      }

      .toast {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 30;
        padding: 9px 12px;
        border: 1px solid rgba(34, 211, 238, 0.36);
        border-radius: var(--radius);
        background: rgba(8, 47, 73, 0.92);
        color: #ecfeff;
        font-size: 12px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      }

      /* phase pill in sidecar header */
      .phase-pill {
        padding: 2px 9px;
        border-radius: 999px;
        border: 1px solid rgba(34, 211, 238, 0.4);
        background: var(--cyan-weak);
        color: #cffafe;
        font-size: 11px;
      }

      .phase-pill.clarify { border-color: rgba(34, 211, 238, 0.4); }
      .phase-pill.proposal { border-color: rgba(251, 191, 36, 0.45); background: rgba(251, 191, 36, 0.12); color: #fde68a; }
      .phase-pill.executing { border-color: rgba(52, 211, 153, 0.45); background: rgba(52, 211, 153, 0.12); color: #bbf7d0; }

      .section-title-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 9px;
      }

      .section-title-row h3 { margin: 0; }

      /* auto-approve split config toggle */
      .config-toggle {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 4px 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface-2);
        color: var(--muted);
        font-size: 11px;
      }

      .config-toggle.on {
        border-color: rgba(52, 211, 153, 0.5);
        color: #bbf7d0;
      }

      .config-switch {
        width: 26px;
        height: 15px;
        flex: none;
        border-radius: 999px;
        background: #1e293b;
        position: relative;
        transition: background 0.12s;
      }

      .config-toggle.on .config-switch { background: rgba(52, 211, 153, 0.6); }

      .config-switch::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #e2e8f0;
        transition: transform 0.12s;
      }

      .config-toggle.on .config-switch::after { transform: translateX(11px); }

      /* clarify chat */
      .clarify-section {
        min-height: 0;
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 12px;
      }

      .clarify-body {
        min-height: 0;
        flex: 1;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 10px;
      }

      .chat-msg {
        max-width: 92%;
        padding: 8px 10px;
        border-radius: 9px;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .chat-msg.user {
        align-self: flex-end;
        background: rgba(34, 211, 238, 0.16);
        color: #ecfeff;
        border: 1px solid rgba(34, 211, 238, 0.3);
      }

      .chat-msg.agent {
        align-self: flex-start;
        background: var(--surface);
        color: #cbd5e1;
        border: 1px solid var(--line);
      }

      .clarify-actions {
        flex: none;
        display: flex;
        gap: 8px;
      }

      .primary-button {
        flex: 1;
        height: 34px;
        border-radius: 7px;
        background: #67e8f9;
        color: #082f49;
        font-weight: 650;
      }

      .primary-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .ghost-button {
        height: 34px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface-2);
        color: #cbd5e1;
      }

      /* worker split proposal */
      .proposal-section {
        min-height: 0;
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 12px;
        overflow: auto;
      }

      .proposal-summary {
        margin: 0 0 10px;
        font-size: 12px;
        line-height: 1.55;
        color: #e2e8f0;
      }

      .worker-card {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 9px 10px;
        margin-bottom: 7px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface-2);
      }

      .worker-role {
        flex: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 8px;
        border-radius: 999px;
        background: #07111f;
        color: #cbd5e1;
        font-size: 11px;
      }

      .worker-intent {
        flex: 1;
        min-width: 0;
        font-size: 12px;
        color: #e2e8f0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .worker-remove {
        flex: none;
        width: 22px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 5px;
        background: transparent;
        color: var(--dim);
      }

      .worker-remove:hover { color: var(--danger); background: rgba(251, 113, 133, 0.12); }

      .add-worker {
        width: 100%;
        height: 30px;
        margin-bottom: 10px;
        border: 1px dashed var(--line-strong);
        border-radius: 7px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
      }

      .add-worker:hover { border-color: var(--cyan); color: #ecfeff; }

      /* prototype-only: simulate agent-initiated propose-split trigger */
      .sim-trigger {
        margin-top: 8px;
        width: 100%;
        height: 30px;
        border: 1px dashed rgba(251, 191, 36, 0.5);
        border-radius: 7px;
        background: rgba(251, 191, 36, 0.06);
        color: #fcd34d;
        font-size: 11px;
      }

      .sim-trigger:hover {
        border-color: rgba(251, 191, 36, 0.8);
        background: rgba(251, 191, 36, 0.12);
      }

      .proposal-actions {
        flex: none;
        display: flex;
        gap: 8px;
        margin-top: auto;
        padding-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
