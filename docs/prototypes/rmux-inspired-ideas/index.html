<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Runweave × RMUX 借鉴原型</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --surface: #050816;
        --surface-2: #07111f;
        --surface-3: #0b1220;
        --line: #1e293b;
        --line-strong: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --dim: #64748b;
        --cyan: #22d3ee;
        --cyan-weak: rgba(34, 211, 238, 0.14);
        --green: #34d399;
        --green-weak: rgba(52, 211, 153, 0.14);
        --amber: #fbbf24;
        --amber-weak: rgba(251, 191, 36, 0.14);
        --danger: #fb7185;
        --danger-weak: rgba(251, 113, 133, 0.14);
        --violet: #a78bfa;
        --violet-weak: rgba(167, 139, 250, 0.14);
        --radius: 8px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 1180px;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
      }
      button { border: 0; color: inherit; cursor: pointer; font: inherit; background: none; }
      code, .mono { font-family: "SFMono-Regular", ui-monospace, Menlo, monospace; }

      .app { height: 100vh; display: flex; overflow: hidden; }

      /* ---- left nav ---- */
      .nav {
        flex: none; width: 248px; background: var(--surface);
        border-right: 1px solid var(--line);
        display: flex; flex-direction: column; padding: 14px 10px; gap: 4px;
      }
      .nav-brand { padding: 6px 10px 14px; }
      .nav-brand h1 { margin: 0; font-size: 14px; letter-spacing: 0.2px; }
      .nav-brand p { margin: 4px 0 0; font-size: 11px; color: var(--dim); line-height: 1.5; }
      .nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
        color: var(--dim); padding: 12px 10px 6px; }
      .nav-item {
        display: flex; align-items: flex-start; gap: 10px;
        width: 100%; text-align: left; padding: 9px 10px; border-radius: var(--radius);
        color: var(--muted);
      }
      .nav-item:hover { background: var(--surface-2); color: var(--text); }
      .nav-item.active { background: var(--cyan-weak); color: var(--text); }
      .nav-item .idx {
        flex: none; width: 20px; height: 20px; border-radius: 6px;
        display: grid; place-items: center; font-size: 11px; font-weight: 600;
        background: var(--surface-3); color: var(--muted);
      }
      .nav-item.active .idx { background: var(--cyan); color: #04121a; }
      .nav-item .nav-text { display: flex; flex-direction: column; gap: 2px; }
      .nav-item .nav-title { font-size: 12.5px; font-weight: 600; }
      .nav-item .nav-sub { font-size: 10.5px; color: var(--dim); line-height: 1.4; }
      .nav-foot { margin-top: auto; font-size: 10px; color: var(--dim); padding: 10px; line-height: 1.5; }

      /* ---- main ---- */
      .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
      .view-head {
        flex: none; padding: 18px 24px 14px; border-bottom: 1px solid var(--line);
        background: var(--surface);
      }
      .view-head h2 { margin: 0; font-size: 17px; }
      .view-head .why { margin: 8px 0 0; font-size: 12px; color: var(--muted); line-height: 1.6; max-width: 940px; }
      .view-head .rmux-tag {
        display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
        font-size: 11px; color: var(--violet);
        background: var(--violet-weak); padding: 3px 9px; border-radius: 999px;
      }
      .view-body { flex: 1; overflow: auto; padding: 20px 24px 40px; }

      /* ---- generic ---- */
      .card { background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; }
      .grid { display: grid; gap: 12px; }
      .grid-3 { grid-template-columns: repeat(3, 1fr); }
      .grid-2 { grid-template-columns: repeat(2, 1fr); }
      .row { display: flex; align-items: center; gap: 8px; }
      .col { display: flex; flex-direction: column; }
      .between { justify-content: space-between; }
      .wrap { flex-wrap: wrap; }
      .muted { color: var(--muted); }
      .dim { color: var(--dim); }
      .grow { flex: 1; }
      .section-title { font-size: 12px; font-weight: 600; margin: 22px 0 10px; color: var(--muted); }

      .chip {
        display: inline-flex; align-items: center; gap: 5px;
        font-size: 10.5px; padding: 2px 8px; border-radius: 999px;
        background: var(--surface-3); color: var(--muted); border: 1px solid var(--line);
      }
      .chip.cyan { color: var(--cyan); border-color: var(--cyan); background: var(--cyan-weak); }
      .chip.violet { color: var(--violet); border-color: var(--violet); background: var(--violet-weak); }
      .chip.green { color: var(--green); border-color: var(--green); background: var(--green-weak); }
      .dot { width: 7px; height: 7px; border-radius: 999px; flex: none; }
      .dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
      .dot.amber { background: var(--amber); }
      .dot.danger { background: var(--danger); }
      .dot.dim { background: var(--dim); }
      .dot.cyan { background: var(--cyan); }

      .btn {
        padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
        background: var(--surface-3); border: 1px solid var(--line-strong); color: var(--text);
      }
      .btn:hover { border-color: var(--cyan); }
      .btn.primary { background: var(--cyan); color: #04121a; border-color: var(--cyan); }
      .btn.danger { background: var(--danger-weak); color: var(--danger); border-color: var(--danger); }
      .btn.ghost { background: none; border-color: var(--line); color: var(--muted); }
      .btn.sm { padding: 4px 9px; font-size: 11px; }
      .btn:disabled { opacity: .45; cursor: not-allowed; }

      .seg { display: inline-flex; background: var(--surface-3); border: 1px solid var(--line); border-radius: 7px; overflow: hidden; }
      .seg button { padding: 5px 11px; font-size: 11.5px; color: var(--muted); }
      .seg button.active { background: var(--cyan-weak); color: var(--text); }

      /* ---- idea 1: web share ---- */
      .share-grid { display: grid; grid-template-columns: 300px 1fr; gap: 16px; align-items: start; }
      .term-list .term { padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--line);
        background: var(--surface-2); cursor: pointer; margin-bottom: 8px; }
      .term.active { border-color: var(--cyan); background: var(--cyan-weak); }
      .term .t-task { font-size: 12px; margin: 6px 0 0; line-height: 1.4; }
      .term .t-meta { font-size: 10.5px; color: var(--dim); margin-top: 6px; }
      .agent-badge { font-size: 10px; padding: 1px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
      .agent-codex { background: rgba(34,211,238,0.15); color: var(--cyan); }
      .agent-claude { background: rgba(251,146,60,0.15); color: #fdba74; }
      .agent-coco { background: rgba(167,139,250,0.15); color: var(--violet); }
      .agent-bash { background: rgba(148,163,184,0.15); color: var(--muted); }
      .link-row { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border: 1px solid var(--line);
        border-radius: 7px; background: var(--surface-3); margin-bottom: 8px; }
      .role-pill { font-size: 10.5px; font-weight: 700; padding: 2px 9px; border-radius: 999px; letter-spacing: .4px; }
      .role-operator { background: var(--amber-weak); color: var(--amber); }
      .role-spectator { background: var(--surface); color: var(--muted); border: 1px solid var(--line); }
      .viewer { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 1px solid var(--line); font-size: 12px; }
      .rtt { font-family: ui-monospace, monospace; font-size: 11px; }
      .rtt.ok { color: var(--green); } .rtt.warn { color: var(--amber); } .rtt.bad { color: var(--danger); }

      /* ---- idea 2: behavior verify ---- */
      .verify-grid { display: grid; grid-template-columns: 1fr 340px; gap: 16px; align-items: start; }
      .step { display: flex; gap: 12px; padding: 11px 12px; border-radius: var(--radius);
        border: 1px solid var(--line); background: var(--surface-2); margin-bottom: 8px; cursor: pointer; }
      .step.sel { border-color: var(--cyan); }
      .step .st-idx { flex: none; width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center;
        font-size: 11px; font-weight: 700; }
      .st-pass { background: var(--green-weak); color: var(--green); }
      .st-fail { background: var(--danger-weak); color: var(--danger); }
      .st-idle { background: var(--surface-3); color: var(--dim); }
      .step .op { font-family: ui-monospace, monospace; font-size: 11.5px; color: var(--cyan); }
      .step .arg { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); }
      .snapshot { background: #01040b; border: 1px solid var(--line); border-radius: var(--radius);
        padding: 12px 14px; font-family: ui-monospace, monospace; font-size: 12px; line-height: 1.6;
        white-space: pre-wrap; color: #b9c7d9; min-height: 120px; }
      .palette-op { padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; margin-bottom: 6px; background: var(--surface-3); }
      .palette-op .pop { font-family: ui-monospace, monospace; font-size: 11.5px; color: var(--cyan); }
      .palette-op .phint { font-size: 10.5px; color: var(--dim); margin-top: 3px; line-height: 1.4; }

      /* ---- idea 3: diagnose / capabilities ---- */
      .cap-table td, .cap-table th { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--line); font-size: 12px; }
      .cap-table th { font-size: 10.5px; text-transform: uppercase; letter-spacing: .6px; color: var(--dim); }
      .health-bar { height: 6px; border-radius: 999px; background: var(--surface-3); overflow: hidden; width: 90px; }
      .health-bar > i { display: block; height: 100%; }
      .cap-ok { color: var(--green); } .cap-no { color: var(--danger); }
      .warn-line { display: flex; gap: 8px; font-size: 11.5px; color: var(--amber); padding: 5px 0; line-height: 1.5; }
      .raw-json { background: #01040b; border: 1px solid var(--line); border-radius: var(--radius);
        padding: 12px 14px; font-family: ui-monospace, monospace; font-size: 11.5px; line-height: 1.5;
        white-space: pre; color: #8fb3c9; overflow: auto; }

      /* ---- idea 4: command palette ---- */
      .cmd-search { width: 100%; padding: 10px 12px; background: var(--surface-3); border: 1px solid var(--line-strong);
        border-radius: 8px; color: var(--text); font-size: 13px; margin-bottom: 12px; }
      .cmd-search:focus { outline: none; border-color: var(--cyan); }
      .cmd-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1px solid var(--line);
        border-radius: 7px; background: var(--surface-2); margin-bottom: 7px; }
      .cmd-name { font-family: ui-monospace, monospace; font-size: 12.5px; color: var(--cyan); font-weight: 600; min-width: 128px; }
      .cmd-args { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); }
      .cmd-desc { font-size: 11.5px; color: var(--dim); margin-top: 3px; }
      .cat-pill { font-size: 9.5px; text-transform: uppercase; letter-spacing: .5px; padding: 1px 7px; border-radius: 4px;
        background: var(--surface-3); color: var(--muted); border: 1px solid var(--line); }
      .preview-cmd { background: #01040b; border: 1px solid var(--line-strong); border-radius: 7px; padding: 9px 12px;
        font-family: ui-monospace, monospace; font-size: 12px; color: var(--green); margin-top: 4px; }

      .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
        background: var(--surface-3); border: 1px solid var(--cyan); color: var(--text);
        padding: 9px 16px; border-radius: 8px; font-size: 12.5px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); z-index: 50; }
      .note-box { margin-top: 16px; padding: 12px 14px; border-radius: var(--radius);
        background: var(--violet-weak); border: 1px dashed var(--line-strong); font-size: 11.5px; color: var(--muted); line-height: 1.6; }
      .note-box b { color: var(--violet); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
