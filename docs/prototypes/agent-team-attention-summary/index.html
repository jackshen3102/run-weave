<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Team 当前关注卡片</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020817;
        --surface: #071225;
        --surface-strong: #0b172a;
        --line: #273449;
        --muted: #91a0b8;
        --text: #d9e1ee;
        --amber: #fbbf24;
        --amber-line: #92400e;
        --amber-bg: rgba(120, 53, 15, 0.22);
        --rose: #fb7185;
        --rose-line: #9f1239;
        --emerald: #34d399;
        --sky: #38bdf8;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a1020;
        color: var(--text);
      }

      button {
        border: 0;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }

      .agent-team-panel {
        width: min(560px, 100vw);
        height: min(820px, 100vh);
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        overflow: hidden;
        border: 1px solid var(--line);
        background: var(--bg);
      }

      .panel-header {
        min-height: 52px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 16px;
        border-bottom: 1px solid var(--line);
      }

      .panel-header h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
      }

      .status-badge {
        border-radius: 6px;
        padding: 5px 8px;
        background: rgba(245, 158, 11, 0.16);
        color: #fcd34d;
        font-size: 11px;
        font-weight: 600;
      }

      .attention-region {
        padding: 10px 14px 0;
        background: var(--bg);
      }

      .attention-card {
        border: 1px solid var(--amber-line);
        border-radius: 8px;
        background: var(--amber-bg);
        padding: 11px 12px;
      }

      .attention-heading,
      .attention-title-row,
      .attention-actions,
      .section-heading,
      .case-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .attention-heading {
        color: #fcd34d;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .attention-heading span:last-child {
        color: #d6a94e;
        font-weight: 500;
        letter-spacing: 0;
      }

      .attention-title-row {
        margin-top: 7px;
        justify-content: flex-start;
      }

      .severity {
        border-radius: 4px;
        padding: 2px 5px;
        background: rgba(251, 113, 133, 0.18);
        color: #fda4af;
        font-size: 10px;
        font-weight: 700;
      }

      .attention-title {
        font-size: 13px;
        font-weight: 650;
        color: #fff3d2;
      }

      .attention-summary {
        margin: 5px 0 0;
        display: -webkit-box;
        overflow: hidden;
        color: #e6d6b4;
        font-size: 11px;
        line-height: 1.5;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .attention-meta {
        margin-top: 5px;
        color: #bda97f;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
      }

      .attention-actions {
        margin-top: 9px;
        justify-content: flex-end;
      }

      .attention-action {
        min-height: 28px;
        border: 1px solid #7c5b20;
        border-radius: 6px;
        padding: 0 9px;
        background: rgba(15, 23, 42, 0.54);
        color: #fde68a;
        font-size: 10px;
      }

      .attention-action.primary {
        border-color: #a16207;
        background: rgba(180, 83, 9, 0.28);
      }

      .scroll-content {
        min-height: 0;
        overflow-y: auto;
        padding: 14px;
      }

      .section-heading {
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 650;
        text-transform: uppercase;
      }

      .observe-only {
        border: 1px solid var(--line);
        border-radius: 5px;
        padding: 3px 6px;
        color: #64748b;
        font-size: 9px;
        font-weight: 500;
      }

      .checkpoint,
      .loop-card,
      .case-card,
      .log-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(11, 23, 42, 0.72);
      }

      .checkpoint {
        margin-bottom: 12px;
        padding: 11px;
        border-color: #075985;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.7;
      }

      .checkpoint strong {
        color: #7dd3fc;
      }

      .loop-card {
        margin-bottom: 12px;
        padding: 11px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.7;
      }

      .progress {
        margin-top: 7px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
      }

      .progress span {
        height: 6px;
        border-radius: 99px;
        background: #334155;
      }

      .completion-note {
        margin-bottom: 18px;
        border: 1px solid #065f46;
        border-radius: 8px;
        background: rgba(6, 78, 59, 0.2);
        padding: 11px;
        color: #6ee7b7;
        font-size: 11px;
      }

      .case-list {
        display: grid;
        gap: 8px;
      }

      .case-card {
        padding: 10px;
        color: #cbd5e1;
        font-size: 11px;
      }

      .case-card.pass {
        border-color: #064e3b;
        background: rgba(6, 78, 59, 0.16);
      }

      .case-card.fail {
        border-color: var(--rose-line);
        background: rgba(136, 19, 55, 0.18);
      }

      .case-id {
        color: #94a3b8;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
      }

      .case-result {
        color: var(--emerald);
      }

      .case-card.fail .case-result {
        color: var(--rose);
      }

      .case-card p {
        margin: 5px 0 0;
        line-height: 1.5;
      }

      .case-card.fail.flash {
        outline: 2px solid rgba(251, 191, 36, 0.8);
        outline-offset: 2px;
      }

      .log-card {
        margin-top: 16px;
        padding: 10px;
        color: #7c8ba1;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
        line-height: 1.65;
      }

      @media (max-width: 560px) {
        .agent-team-panel {
          border: 0;
        }
      }
    </style>
  </head>
  <body>
    <main id="app" class="agent-team-panel"></main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
