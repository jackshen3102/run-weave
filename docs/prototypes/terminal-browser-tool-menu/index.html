<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Runweave Browser Tool Menu Prototype</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: #020617;
        color: #e2e8f0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #020617;
      }
      button,
      input {
        color: inherit;
        font: inherit;
      }
      button {
        border: 0;
        cursor: pointer;
      }
      .app {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .browser-shell {
        position: relative;
        width: min(720px, 100%);
        overflow: hidden;
        border: 1px solid #1e293b;
        border-radius: 10px;
        background: #020617;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }
      .tabs {
        height: 38px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 10px;
        border-bottom: 1px solid #1e293b;
        background: #030712;
      }
      .tab {
        height: 26px;
        min-width: 150px;
        padding: 0 10px;
        border-radius: 6px;
        background: #111827;
        color: #cbd5e1;
        font-size: 12px;
        text-align: left;
      }
      .tab[aria-selected="true"] {
        background: #1e293b;
        color: #f8fafc;
      }
      .navigation {
        min-height: 40px;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 5px 8px;
        border-bottom: 1px solid #1e293b;
        background: #030712;
      }
      .nav-button {
        width: 28px;
        height: 28px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        border-radius: 6px;
        background: transparent;
        color: #cbd5e1;
        font-size: 17px;
      }
      .nav-button:hover,
      .nav-button[aria-expanded="true"] {
        background: #1e293b;
        color: #f8fafc;
      }
      .address {
        min-width: 0;
        height: 28px;
        flex: 1;
        border: 1px solid #1e293b;
        border-radius: 6px;
        background: #0f172a;
        padding: 0 9px;
        font-size: 12px;
        outline: none;
      }
      .tool-tray {
        position: absolute;
        top: 74px;
        right: 8px;
        z-index: 2;
        width: 230px;
        padding: 5px;
        border: 1px solid #334155;
        border-radius: 7px;
        background: #111827;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
      }
      .tool-tray[hidden] {
        display: none;
      }
      .tool-item {
        width: 100%;
        min-height: 34px;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0 10px;
        border-radius: 7px;
        background: transparent;
        color: #cbd5e1;
        font-size: 12px;
        text-align: left;
      }
      .tool-item:disabled {
        cursor: default;
        color: #64748b;
      }
      .tool-item:hover {
        background: #172033;
        color: #f8fafc;
      }
      .tool-item:disabled:hover {
        background: transparent;
        color: #64748b;
      }
      .tool-icon {
        width: 20px;
        color: #94a3b8;
        text-align: center;
      }
      .tool-value {
        margin-left: auto;
        color: #94a3b8;
        font-variant-numeric: tabular-nums;
      }
      .menu-chevron {
        width: 10px;
        color: #64748b;
        text-align: right;
      }
      .menu-item-with-submenu {
        position: relative;
      }
      .zoom-submenu {
        position: absolute;
        top: 0;
        right: calc(100% + 6px);
        width: 180px;
        padding: 5px;
        border: 1px solid #334155;
        border-radius: 7px;
        background: #111827;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
      }
      .zoom-submenu[hidden] {
        display: none;
      }
      .menu-separator {
        height: 1px;
        margin: 4px 6px;
        background: #334155;
      }
      .browser-viewport {
        min-height: 340px;
        height: 340px;
        overflow: hidden;
        background: #e2e8f0;
      }
      .browser-page {
        min-height: 340px;
        transform-origin: top left;
        padding: 42px;
        background: #fff;
        color: #334155;
      }
      .browser-page h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      .browser-page p {
        margin: 0;
        color: #64748b;
        font-size: 14px;
      }
      .content-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(180px, 1fr));
        gap: 16px;
        margin-top: 28px;
      }
      .content-card {
        min-height: 120px;
        padding: 18px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        background: #f8fafc;
      }
      .content-card strong {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main id="app" class="app"></main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
