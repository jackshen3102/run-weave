<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>状态查询原型</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050814;
        --surface: #0f172a;
        --surface-2: #111c2e;
        --surface-3: #172033;
        --line: #263449;
        --line-soft: #1e293b;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --subtle: #64748b;
        --accent: #38bdf8;
        --green: #34d399;
        --amber: #fbbf24;
        --red: #fb7185;
        --blue: #60a5fa;
        --radius: 8px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        color: inherit;
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 44px 1fr;
        background: var(--bg);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 14px;
        border-bottom: 1px solid var(--line-soft);
        background: #070d1c;
      }

      .title,
      .session {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .title strong,
      .session strong,
      .truncate {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .title span,
      .session span,
      .muted {
        color: var(--muted);
        font-size: 12px;
      }

      .workspace {
        min-height: 0;
        display: grid;
        grid-template-rows: 38px 1fr;
      }

      .terminal-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        border-bottom: 1px solid var(--line-soft);
        background: #08101f;
      }

      .project-select {
        min-width: 260px;
        max-width: 38vw;
        height: 26px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        font-size: 12px;
      }

      .toolbar-spacer {
        flex: 1;
      }

      .icon-button {
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
      }

      .icon-button:hover,
      .icon-button.is-active {
        background: var(--surface-3);
        color: var(--text);
      }

      .more-menu-wrap {
        position: relative;
      }

      .more-menu {
        position: absolute;
        top: 32px;
        right: 0;
        z-index: 10;
        width: 190px;
        padding: 5px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #0b1220;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.42);
      }

      .menu-item {
        width: 100%;
        height: 32px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 9px;
        border-radius: 5px;
        background: transparent;
        color: var(--text);
        font-size: 13px;
        text-align: left;
      }

      .menu-item:hover {
        background: var(--surface-3);
      }

      .menu-icon {
        width: 18px;
        height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 5px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
      }

      .terminal-area {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
      }

      .terminal-screen {
        min-width: 0;
        padding: 20px;
        background: #050917;
        color: #d8e3f0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
        line-height: 1.7;
      }

      .side-panel {
        min-width: 0;
        border-left: 1px solid var(--line-soft);
        background: #080f1e;
      }

      .side-panel header,
      .side-panel section {
        padding: 14px;
        border-bottom: 1px solid var(--line-soft);
      }

      .side-panel h2 {
        margin: 0 0 8px;
        font-size: 13px;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .pill {
        max-width: 100%;
        padding: 3px 7px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 11px;
      }

      .backdrop {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: start center;
        padding: 86px 16px 32px;
        background: rgba(2, 6, 23, 0.58);
      }

      .dialog {
        width: min(720px, calc(100vw - 32px));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #08111f;
        box-shadow: 0 22px 80px rgba(0, 0, 0, 0.5);
        overflow: hidden;
      }

      .dialog-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px 12px;
        border-bottom: 1px solid var(--line-soft);
      }

      .dialog-title {
        min-width: 0;
      }

      .dialog-title strong {
        display: block;
        font-size: 15px;
      }

      .dialog-title span {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
      }

      .dialog-body {
        padding: 14px 16px 16px;
      }

      .lookup-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
      }

      .lookup-mode {
        display: inline-flex;
        align-items: center;
        margin-bottom: 10px;
        padding: 2px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface);
      }

      .lookup-mode button {
        height: 26px;
        padding: 0 10px;
        border-radius: 5px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
      }

      .lookup-mode button.is-active {
        background: var(--surface-3);
        color: var(--text);
      }

      .lookup-input {
        min-width: 0;
        height: 36px;
        padding: 0 11px;
        border: 1px solid var(--line);
        border-radius: 7px;
        outline: none;
        background: var(--surface);
        color: var(--text);
      }

      .lookup-input:focus {
        border-color: var(--accent);
      }

      .button {
        height: 36px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--surface-3);
        color: var(--text);
        font-size: 13px;
      }

      .button.primary {
        border-color: #0ea5e9;
        background: #0ea5e9;
        color: #03111a;
        font-weight: 700;
      }

      .button:hover {
        filter: brightness(1.08);
      }

      .quick-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 9px;
      }

      .quick-chip {
        max-width: 100%;
        height: 24px;
        padding: 0 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-size: 11px;
      }

      .terminal-result {
        margin-top: 14px;
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        background: #0a1324;
        overflow: hidden;
      }

      .terminal-result__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line-soft);
      }

      .terminal-result__header strong {
        font-size: 13px;
      }

      .candidate-list {
        display: grid;
        gap: 1px;
        background: var(--line-soft);
      }

      .candidate-row {
        width: 100%;
        min-height: 52px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        padding: 9px 12px;
        background: #0a1324;
        text-align: left;
      }

      .candidate-row:hover,
      .candidate-row.is-selected {
        background: #102033;
      }

      .candidate-main,
      .candidate-meta {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .candidate-main strong,
      .candidate-main span,
      .candidate-meta span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .candidate-main strong {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
      }

      .candidate-main span,
      .candidate-meta span {
        color: var(--muted);
        font-size: 11px;
      }

      .status-panel {
        margin-top: 14px;
        border: 1px solid var(--line-soft);
        border-radius: var(--radius);
        background: #0a1324;
        overflow: hidden;
      }

      .status-summary {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        padding: 12px;
        border-bottom: 1px solid var(--line-soft);
      }

      .thread-id {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
      }

      .status-badge {
        align-self: start;
        min-width: 82px;
        height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .status-running {
        background: rgba(52, 211, 153, 0.16);
        color: var(--green);
      }

      .status-idle,
      .status-completed {
        background: rgba(96, 165, 250, 0.16);
        color: var(--blue);
      }

      .status-failed {
        background: rgba(251, 113, 133, 0.16);
        color: var(--red);
      }

      .status-unknown {
        background: rgba(251, 191, 36, 0.16);
        color: var(--amber);
      }

      .facts {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1px;
        background: var(--line-soft);
      }

      .fact {
        min-width: 0;
        padding: 10px 12px;
        background: #0a1324;
      }

      .fact label {
        display: block;
        margin-bottom: 4px;
        color: var(--subtle);
        font-size: 11px;
      }

      .fact span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
      }

      .note {
        padding: 11px 12px;
        border-top: 1px solid var(--line-soft);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid var(--line-soft);
      }

      .empty-state {
        margin-top: 14px;
        padding: 22px 14px;
        border: 1px dashed var(--line);
        border-radius: var(--radius);
        color: var(--muted);
        text-align: center;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 30;
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #0b1220;
        color: var(--text);
        box-shadow: 0 14px 42px rgba(0, 0, 0, 0.38);
        font-size: 12px;
      }

      @media (max-width: 820px) {
        .terminal-area {
          grid-template-columns: 1fr;
        }

        .side-panel {
          display: none;
        }

        .facts {
          grid-template-columns: 1fr;
        }

        .project-select {
          min-width: 0;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const script = document.createElement("script");
      script.type = "module";
      script.src = `./app.js?v=${Date.now()}`;
      document.body.append(script);
    </script>
  </body>
</html>
