<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Team Terminal Scope Sidecar</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: #020617;
        color: #e2e8f0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      button {
        color: inherit;
        font: inherit;
      }
      .workspace {
        width: min(1100px, 94vw);
        height: min(720px, 90vh);
        display: grid;
        grid-template-columns: 1fr 360px;
        overflow: hidden;
        border: 1px solid #1e293b;
        border-radius: 10px;
        background: #0f172a;
      }
      .terminal {
        padding: 20px;
        color: #64748b;
        font:
          13px ui-monospace,
          monospace;
      }
      .sidecar {
        display: flex;
        min-width: 0;
        flex-direction: column;
        border-left: 1px solid #1e293b;
        background: #020617;
      }
      .tools,
      .panel-header,
      .scope {
        display: flex;
        align-items: center;
        border-bottom: 1px solid #1e293b;
      }
      .tools {
        gap: 4px;
        padding: 8px;
      }
      .tool {
        height: 26px;
        border: 0;
        border-radius: 4px;
        padding: 0 9px;
        background: transparent;
        color: #94a3b8;
        cursor: pointer;
      }
      .tool[aria-selected="true"] {
        background: #334155;
        color: #f8fafc;
      }
      .panel {
        min-height: 0;
        flex: 1;
      }
      .panel-header {
        justify-content: space-between;
        padding: 9px 12px;
        font-size: 12px;
      }
      .status {
        border-radius: 4px;
        padding: 2px 6px;
        background: rgb(16 185 129 / 0.2);
        color: #6ee7b7;
        font-size: 10px;
        text-transform: uppercase;
      }
      .scope {
        gap: 5px;
        padding: 7px 12px;
        color: #64748b;
        font:
          10px ui-monospace,
          monospace;
      }
      .scope span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .content {
        padding: 12px;
      }
      .card {
        border: 1px solid #1e293b;
        border-radius: 6px;
        padding: 10px;
        background: rgb(15 23 42 / 0.55);
      }
      .card-title {
        margin-bottom: 8px;
        color: #94a3b8;
        font-size: 11px;
        text-transform: uppercase;
      }
      .row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        font-size: 12px;
      }
      .muted {
        color: #64748b;
      }
      @media (max-width: 720px) {
        .workspace {
          grid-template-columns: 1fr;
        }
        .terminal {
          display: none;
        }
        .sidecar {
          border-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
