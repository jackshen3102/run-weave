<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Team Case 裁决</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: #070b14;
        color: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; justify-items: center; align-items: start; }
      button, textarea { font: inherit; }
      button { cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: 0.45; }
      .panel { width: min(420px, 100vw); min-height: min(720px, 100vh); background: #0b1120; border: 1px solid #1e293b; }
      .header { height: 46px; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; border-bottom: 1px solid #1e293b; }
      .header strong { font-size: 13px; }
      .status { border-radius: 4px; padding: 3px 7px; background: rgba(245, 158, 11, .16); color: #fcd34d; font-size: 10px; }
      .content { display: grid; gap: 12px; padding: 12px; }
      .decision { border: 1px solid #92400e; border-radius: 6px; background: rgba(120, 53, 15, .28); padding: 12px; }
      .decision.resolved { border-color: #065f46; background: rgba(6, 78, 59, .24); }
      .eyebrow { color: #fbbf24; font-size: 10px; font-weight: 700; text-transform: uppercase; }
      .resolved .eyebrow { color: #6ee7b7; }
      h1 { margin: 6px 0 0; font-size: 14px; }
      .case-id { margin-top: 10px; color: #94a3b8; font-family: ui-monospace, monospace; font-size: 10px; }
      .case-text { margin: 3px 0 0; color: #cbd5e1; font-size: 12px; line-height: 1.5; }
      .observation { margin-top: 10px; border: 1px solid #334155; border-radius: 5px; background: rgba(15, 23, 42, .72); padding: 8px; font-size: 11px; }
      .observation strong { color: #fbbf24; }
      .observation p { margin: 4px 0 0; color: #94a3b8; }
      label { display: block; margin-top: 10px; color: #cbd5e1; font-size: 11px; font-weight: 600; }
      textarea { width: 100%; min-height: 72px; margin-top: 5px; resize: vertical; border: 1px solid #475569; border-radius: 5px; background: #020617; color: #e2e8f0; padding: 8px; }
      .actions { display: grid; gap: 7px; margin-top: 10px; }
      .action { min-height: 34px; border: 1px solid #475569; border-radius: 5px; background: #1e293b; color: #e2e8f0; }
      .action.primary { border-color: #d97706; background: #d97706; color: #1c0f02; font-weight: 700; }
      .record { margin-top: 10px; color: #a7f3d0; font-size: 11px; line-height: 1.55; }
      .evidence { border: 1px solid #1e293b; border-radius: 6px; background: rgba(15, 23, 42, .5); padding: 10px; }
      .evidence h2 { margin: 0; color: #94a3b8; font-size: 11px; }
      .evidence p { margin: 5px 0 0; color: #64748b; font-size: 10px; }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
