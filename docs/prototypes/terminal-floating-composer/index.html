<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Runweave Terminal Floating Composer Prototype</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --surface: #07111f;
        --surface-2: #0b1220;
        --surface-3: #0f172a;
        --line: #1e293b;
        --line-strong: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --dim: #64748b;
        --accent: #22d3ee;
        --accent-weak: rgba(34, 211, 238, 0.14);
        --success: #34d399;
        --warning: #fbbf24;
        --danger: #fb7185;
        --terminal: #0b1220;
        --radius: 7px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 1040px;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      button,
      textarea {
        color: inherit;
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        height: 100vh;
        display: grid;
        grid-template-rows: 36px 1fr;
        overflow: hidden;
        background: var(--bg);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 10px;
        border-bottom: 1px solid var(--line);
        background: rgba(2, 6, 23, 0.98);
      }

      .title {
        min-width: 0;
        display: flex;
        align-items: baseline;
        gap: 10px;
      }

      .title strong,
      .title span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .title strong {
        font-size: 13px;
      }

      .title span {
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 7px;
      }

      .button,
      .icon-button,
      .segmented button {
        min-height: 28px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface-3);
        color: #cbd5e1;
      }

      .button {
        padding: 0 10px;
        font-size: 12px;
      }

      .icon-button {
        width: 30px;
        display: grid;
        place-items: center;
        font-size: 15px;
      }

      .button:hover,
      .icon-button:hover,
      .segmented button:hover {
        border-color: var(--line-strong);
        background: #111c2e;
        color: #f8fafc;
      }

      .button.primary {
        border-color: rgba(34, 211, 238, 0.46);
        background: var(--accent-weak);
        color: #cffafe;
      }

      .segmented {
        display: flex;
        gap: 4px;
        padding: 2px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #030712;
      }

      .segmented button {
        min-width: 78px;
        border-color: transparent;
        background: transparent;
        font-size: 12px;
      }

      .segmented button.active {
        border-color: rgba(34, 211, 238, 0.35);
        background: var(--accent-weak);
        color: #e0f2fe;
      }

      .workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
      }

      .terminal-wrap {
        min-width: 0;
        min-height: 0;
        position: relative;
        background: var(--terminal);
      }

      .terminal-frame {
        height: 100%;
        min-height: 0;
        display: grid;
        grid-template-rows: 32px minmax(0, 1fr);
      }

      .terminal-tabs {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 8px;
        border-bottom: 1px solid #111827;
        background: #050816;
      }

      .tab {
        height: 25px;
        min-width: 174px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        border: 1px solid #1e293b;
        border-radius: 6px;
        background: #0f172a;
        color: #cbd5e1;
        font-size: 12px;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--success);
      }

      .terminal-surface {
        min-height: 0;
        position: relative;
        overflow: hidden;
      }

      .terminal-scroll {
        height: 100%;
        overflow: auto;
        padding: 10px 12px 88px 12px;
        scrollbar-color: #334155 transparent;
      }

      .terminal-line {
        min-height: 20px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        color: #cbd5e1;
        font:
          12px/20px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .terminal-line.muted {
        color: #64748b;
      }

      .native-prompt {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 42px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        border-top: 1px solid rgba(30, 41, 59, 0.78);
        background: rgba(11, 18, 32, 0.98);
        font:
          12px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .native-draft {
        min-width: 0;
        flex: 1;
        border: 0;
        background: transparent;
        color: #e2e8f0;
        outline: none;
        font:
          12px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .native-prompt.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .cursor {
        width: 7px;
        height: 16px;
        background: #f8fafc;
        animation: blink 1s steps(2, start) infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      .scroll-button {
        position: absolute;
        left: 50%;
        bottom: 72px;
        z-index: 4;
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border: 1px solid #334155;
        border-radius: 999px;
        background: rgba(2, 6, 23, 0.95);
        color: #f8fafc;
        box-shadow: 0 10px 24px rgba(2, 6, 23, 0.34);
        transform: translateX(-50%);
      }

      .composer {
        position: absolute;
        right: 66px;
        bottom: 14px;
        left: 14px;
        z-index: 5;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding: 6px;
        border: 1px solid rgba(51, 65, 85, 0.92);
        border-radius: 8px;
        background: rgba(7, 17, 31, 0.97);
        box-shadow: 0 12px 34px rgba(2, 6, 23, 0.46);
        backdrop-filter: blur(10px);
      }

      .composer textarea {
        width: 100%;
        min-height: 36px;
        max-height: 92px;
        resize: none;
        border: 0;
        border-radius: 6px;
        background: #050c18;
        color: #e2e8f0;
        outline: none;
        padding: 8px 10px;
        font:
          12px/18px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .composer textarea:focus {
        box-shadow:
          inset 0 0 0 1px rgba(34, 211, 238, 0.42),
          0 0 0 2px rgba(34, 211, 238, 0.09);
      }

      .composer-actions {
        display: flex;
        align-items: center;
      }

      .composer-send-button {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-color: rgba(34, 211, 238, 0.38);
        border-radius: 7px;
        background: rgba(34, 211, 238, 0.18);
        color: #dff7ff;
      }

      .composer-send-button:hover {
        border-color: rgba(34, 211, 238, 0.58);
        background: rgba(34, 211, 238, 0.26);
      }

      .composer-send-button svg {
        width: 17px;
        height: 17px;
      }

      .sidecar {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        gap: 12px;
        padding: 14px;
        border-left: 1px solid var(--line);
        background: #050816;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .panel-header {
        min-height: 36px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 0 10px;
        border-bottom: 1px solid var(--line);
      }

      .panel-header strong {
        font-size: 12px;
      }

      .panel-body {
        padding: 10px;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .metric {
        min-height: 64px;
        padding: 9px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #0b1220;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 11px;
      }

      .metric strong {
        display: block;
        margin-top: 6px;
        color: #f8fafc;
        font-size: 18px;
      }

      .event-list {
        min-height: 0;
        display: grid;
        align-content: start;
        gap: 7px;
        overflow: auto;
      }

      .event {
        padding: 8px;
        border: 1px solid #1e293b;
        border-radius: 7px;
        background: #0b1220;
        color: #94a3b8;
        font:
          11px/16px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .event.strong {
        border-color: rgba(34, 211, 238, 0.36);
        color: #cffafe;
      }

      @media (max-width: 920px) {
        body {
          min-width: 0;
        }

        .workspace {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(520px, 1fr) 300px;
        }

        .sidecar {
          border-left: 0;
          border-top: 1px solid var(--line);
        }

        .composer {
          right: 16px;
          left: 16px;
          grid-template-columns: 1fr;
        }

        .composer-actions {
          justify-content: flex-end;
        }

        .scroll-button {
          bottom: 126px;
        }
      }
    </style>
  </head>
  <body>
    <main id="app" class="app"></main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
