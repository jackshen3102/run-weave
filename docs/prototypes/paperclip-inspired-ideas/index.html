<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Runweave × Paperclip 借鉴原型</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --surface: #050816;
        --surface-2: #07111f;
        --surface-3: #0b1220;
        --line: #1e293b;
        --line-strong: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --dim: #64748b;
        --cyan: #22d3ee;
        --cyan-weak: rgba(34, 211, 238, 0.14);
        --green: #34d399;
        --green-weak: rgba(52, 211, 153, 0.14);
        --amber: #fbbf24;
        --amber-weak: rgba(251, 191, 36, 0.14);
        --danger: #fb7185;
        --danger-weak: rgba(251, 113, 133, 0.14);
        --violet: #a78bfa;
        --radius: 8px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 1180px;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
      }
      button { border: 0; color: inherit; cursor: pointer; font: inherit; background: none; }
      code { font-family: "SFMono-Regular", ui-monospace, Menlo, monospace; }

      .app { height: 100vh; display: flex; overflow: hidden; }

      /* ---- left nav ---- */
      .nav {
        flex: none;
        width: 236px;
        background: var(--surface);
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        padding: 14px 10px;
        gap: 4px;
      }
      .nav-brand { padding: 6px 10px 14px; }
      .nav-brand h1 { margin: 0; font-size: 14px; letter-spacing: 0.2px; }
      .nav-brand p { margin: 4px 0 0; font-size: 11px; color: var(--dim); line-height: 1.5; }
      .nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
        color: var(--dim); padding: 12px 10px 6px; }
      .nav-item {
        display: flex; align-items: flex-start; gap: 10px;
        width: 100%; text-align: left;
        padding: 9px 10px; border-radius: var(--radius);
        color: var(--muted);
      }
      .nav-item:hover { background: var(--surface-2); color: var(--text); }
      .nav-item.active { background: var(--cyan-weak); color: var(--text); }
      .nav-item .idx {
        flex: none; width: 20px; height: 20px; border-radius: 6px;
        display: grid; place-items: center; font-size: 11px; font-weight: 600;
        background: var(--surface-3); color: var(--muted);
      }
      .nav-item.active .idx { background: var(--cyan); color: #04121a; }
      .nav-item .nav-text { display: flex; flex-direction: column; gap: 2px; }
      .nav-item .nav-title { font-size: 12.5px; font-weight: 600; }
      .nav-item .nav-sub { font-size: 10.5px; color: var(--dim); line-height: 1.4; }
      .nav-foot { margin-top: auto; font-size: 10px; color: var(--dim); padding: 10px; line-height: 1.5; }

      /* ---- main ---- */
      .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
      .view-head {
        flex: none; padding: 18px 24px 14px; border-bottom: 1px solid var(--line);
        background: var(--surface);
      }
      .view-head h2 { margin: 0; font-size: 17px; }
      .view-head .why { margin: 8px 0 0; font-size: 12px; color: var(--muted); line-height: 1.6; max-width: 900px; }
      .view-head .paperclip-tag {
        display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
        font-size: 11px; color: var(--violet);
        background: rgba(167, 139, 250, 0.12); padding: 3px 9px; border-radius: 999px;
      }
      .view-body { flex: 1; overflow: auto; padding: 20px 24px 40px; }

      /* ---- generic cards ---- */
      .card {
        background: var(--surface-2); border: 1px solid var(--line);
        border-radius: var(--radius); padding: 14px;
      }
      .grid { display: grid; gap: 12px; }
      .grid-3 { grid-template-columns: repeat(3, 1fr); }
      .grid-2 { grid-template-columns: repeat(2, 1fr); }
      .row { display: flex; align-items: center; gap: 8px; }
      .between { justify-content: space-between; }
      .muted { color: var(--muted); }
      .dim { color: var(--dim); }
      .mono { font-family: "SFMono-Regular", ui-monospace, Menlo, monospace; }

      .chip {
        display: inline-flex; align-items: center; gap: 5px;
        font-size: 10.5px; padding: 2px 8px; border-radius: 999px;
        background: var(--surface-3); color: var(--muted); border: 1px solid var(--line);
      }
      .dot { width: 7px; height: 7px; border-radius: 999px; flex: none; }
      .dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
      .dot.amber { background: var(--amber); }
      .dot.danger { background: var(--danger); }
      .dot.dim { background: var(--dim); }
      .dot.cyan { background: var(--cyan); }

      .status-running { color: var(--green); }
      .status-waiting_input { color: var(--amber); }
      .status-blocked { color: var(--danger); }
      .status-done { color: var(--cyan); }
      .status-idle { color: var(--dim); }

      .btn {
        padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
        background: var(--surface-3); border: 1px solid var(--line-strong); color: var(--text);
      }
      .btn:hover { border-color: var(--cyan); }
      .btn.primary { background: var(--cyan); color: #04121a; border-color: var(--cyan); }
      .btn.danger { background: var(--danger-weak); color: var(--danger); border-color: var(--danger); }
      .btn.ghost { background: none; border-color: var(--line); color: var(--muted); }
      .btn.sm { padding: 4px 9px; font-size: 11px; }

      /* ---- fleet (idea 1) ---- */
      .fleet-toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
      .seg { display: inline-flex; background: var(--surface-3); border: 1px solid var(--line); border-radius: 7px; overflow: hidden; }
      .seg button { padding: 5px 11px; font-size: 11.5px; color: var(--muted); }
      .seg button.active { background: var(--cyan-weak); color: var(--text); }
      .fleet-card { display: flex; flex-direction: column; gap: 10px; cursor: pointer; transition: border-color .12s; }
      .fleet-card:hover { border-color: var(--line-strong); }
      .fleet-card .task { font-size: 12px; color: var(--text); line-height: 1.5; min-height: 34px; }
      .fleet-card .metrics { display: flex; gap: 14px; font-size: 11px; color: var(--dim); }
      .agent-badge { font-size: 10px; padding: 1px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
      .agent-codex { background: rgba(34,211,238,0.15); color: var(--cyan); }
      .agent-claude { background: rgba(251,146,60,0.15); color: #fdba74; }
      .agent-coco { background: rgba(167,139,250,0.15); color: var(--violet); }
      .agent-bash { background: rgba(148,163,184,0.15); color: var(--muted); }
      .attention-strip { display:flex; gap:10px; margin-bottom:14px; }
      .attn { flex:1; padding:10px 14px; border-radius:var(--radius); border:1px solid var(--line); background:var(--surface-2); }
      .attn .n { font-size:22px; font-weight:700; }
      .attn .l { font-size:11px; color:var(--muted); }
      .attn.hot { border-color: var(--danger); }
      .attn.warn { border-color: var(--amber); }

      /* ---- budget (idea 2) ---- */
      .bar { height: 8px; border-radius: 999px; background: var(--surface-3); overflow: hidden; }
      .bar > i { display: block; height: 100%; border-radius: 999px; }
      .bar > i.ok { background: var(--green); }
      .bar > i.warn { background: var(--amber); }
      .bar > i.stopped { background: var(--danger); }
      .budget-usd { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
      .split-bar { display:flex; height:14px; border-radius:5px; overflow:hidden; border:1px solid var(--line); }
      .split-bar > span { display:block; }

      /* ---- table (routines / approvals / activity) ---- */
      table { width: 100%; border-collapse: collapse; }
      th { text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px;
        color: var(--dim); font-weight: 600; padding: 8px 10px; border-bottom: 1px solid var(--line); }
      td { padding: 11px 10px; border-bottom: 1px solid var(--line); font-size: 12.5px; vertical-align: middle; }
      tr:last-child td { border-bottom: 0; }
      tr.clickable:hover { background: var(--surface-3); }

      .risk-high { color: var(--danger); }
      .risk-medium { color: var(--amber); }
      .risk-low { color: var(--green); }

      .toggle { width: 34px; height: 19px; border-radius: 999px; background: var(--surface-3); border: 1px solid var(--line-strong); position: relative; transition: background .15s; }
      .toggle.on { background: var(--green-weak); border-color: var(--green); }
      .toggle > i { position: absolute; top: 2px; left: 2px; width: 13px; height: 13px; border-radius: 999px; background: var(--muted); transition: transform .15s; }
      .toggle.on > i { transform: translateX(15px); background: var(--green); }

      /* ---- activity feed ---- */
      .feed-item { display:flex; gap:12px; padding:10px 4px; border-bottom:1px solid var(--line); }
      .feed-item .ts { flex:none; width:64px; font-size:11px; color:var(--dim); font-family:ui-monospace,monospace; }
      .feed-item .body { flex:1; }
      .feed-item .kind { font-size:10px; text-transform:uppercase; letter-spacing:0.6px; padding:1px 6px; border-radius:4px; margin-right:8px; }
      .kind-tool { background: var(--surface-3); color: var(--muted); }
      .kind-cost { background: var(--amber-weak); color: var(--amber); }
      .kind-completion { background: var(--green-weak); color: var(--green); }
      .kind-approval { background: rgba(167,139,250,0.15); color: var(--violet); }
      .kind-blocked { background: var(--danger-weak); color: var(--danger); }
      .kind-routine { background: var(--cyan-weak); color: var(--cyan); }

      .section-title { font-size: 12px; font-weight: 600; margin: 22px 0 10px; color: var(--muted); }
      .empty { padding: 40px; text-align: center; color: var(--dim); }

      /* toast */
      .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
        background: var(--surface-3); border: 1px solid var(--cyan); color: var(--text);
        padding: 9px 16px; border-radius: 8px; font-size: 12.5px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); z-index: 50; }

      .note-box { margin-top:14px; padding:12px 14px; border-radius:var(--radius);
        background: rgba(167,139,250,0.06); border:1px dashed var(--line-strong); font-size:11.5px; color:var(--muted); line-height:1.6; }
      .note-box b { color: var(--violet); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
