<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Runweave Terminal Panel Split Prototype</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --surface: #050816;
        --surface-2: #07111f;
        --surface-3: #0b1220;
        --line: #1e293b;
        --line-strong: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --dim: #64748b;
        --cyan: #22d3ee;
        --cyan-weak: rgba(34, 211, 238, 0.14);
        --green: #34d399;
        --danger: #fb7185;
        --radius: 7px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 1180px;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      button {
        border: 0;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }

      .app {
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
      }

      .topbar,
      .tabbar,
      .panel-targetbar {
        flex: none;
        display: flex;
        align-items: center;
        background: rgba(2, 6, 23, 0.98);
        border-bottom: 1px solid var(--line);
      }

      .topbar {
        height: 34px;
        gap: 8px;
        padding: 0 8px;
      }

      .tabbar {
        height: 32px;
      }

      .panel-targetbar {
        height: 40px;
        gap: 8px;
        padding: 0 10px;
      }

      .home-button,
      .icon-button,
      .add-button {
        width: 26px;
        height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
      }

      .home-button:hover,
      .icon-button:hover,
      .add-button:hover {
        background: #0f172a;
        color: var(--text);
      }

      .project-tabs,
      .terminal-tabs,
      .panel-tabs {
        min-width: 0;
        display: flex;
        align-items: center;
      }

      .project-tabs {
        flex: 1;
        gap: 6px;
      }

      .terminal-tabs {
        flex: 1;
        height: 100%;
      }

      .panel-tabs {
        flex: 1;
        gap: 6px;
        overflow: hidden;
      }

      .project-tab {
        height: 25px;
        min-width: 126px;
        max-width: 170px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface-3);
        color: #cbd5e1;
        text-align: left;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .project-tab.active {
        border-color: #2563eb;
        background: #12223a;
        color: #f8fafc;
      }

      .terminal-tab {
        height: 100%;
        min-width: 150px;
        max-width: 250px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 0 10px;
        position: relative;
        border-right: 1px solid var(--line);
        background: var(--surface);
        color: #cbd5e1;
      }

      .terminal-tab.active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 2px;
        background: var(--cyan);
      }

      .tab-name,
      .panel-chip-name,
      .cli-preview {
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .tab-name {
        flex: 1;
      }

      .target-chip {
        color: var(--dim);
        font-size: 12px;
      }

      .tab-close {
        color: var(--dim);
      }

      .breadcrumb {
        flex: none;
        min-width: 148px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        padding: 0 10px;
        border: 1px solid rgba(34, 211, 238, 0.24);
        border-radius: 6px;
        background: var(--cyan-weak);
        color: #cffafe;
        font:
          12px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .panel-chip {
        height: 28px;
        max-width: 168px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 0 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #07111f;
        color: #cbd5e1;
      }

      .panel-chip.active {
        border-color: rgba(34, 211, 238, 0.72);
        background: rgba(8, 47, 73, 0.48);
        color: #f8fafc;
      }

      .dot,
      .tmux-dot {
        width: 8px;
        height: 8px;
        flex: none;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.08);
      }

      .pane-id {
        color: var(--dim);
        font:
          11px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .toolbar-group {
        flex: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .toolbar-button {
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #0f172a;
        color: #dbeafe;
      }

      .toolbar-button:hover {
        border-color: var(--cyan);
      }

      .toolbar-button.secondary {
        color: #bae6fd;
      }

      .toolbar-button.danger:hover {
        border-color: rgba(251, 113, 133, 0.72);
        color: #fecdd3;
      }

      .cli-preview {
        width: 300px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #020617;
        color: #cbd5e1;
        font:
          12px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .workspace {
        min-height: 0;
        flex: 1;
        display: flex;
      }

      .terminal-region {
        min-width: 0;
        flex: 1;
        display: flex;
        position: relative;
        overflow: hidden;
        border-right: 1px solid var(--line);
      }

      .tmux-shell {
        min-width: 0;
        min-height: 0;
        flex: 1;
        margin: 10px;
        display: flex;
        flex-direction: column;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        background: #020617;
        overflow: hidden;
      }

      .tmux-titlebar {
        height: 30px;
        flex: none;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0 10px;
        border-bottom: 1px solid var(--line);
        background: #07111f;
        color: #f8fafc;
        font-size: 12px;
      }

      .transport-note {
        margin-left: auto;
        color: var(--muted);
      }

      .tmux-canvas {
        min-height: 0;
        flex: 1;
        padding: 0;
        background: #020617;
      }

      .tmux-split {
        width: 100%;
        height: 100%;
        min-width: 0;
        min-height: 0;
        display: flex;
      }

      .tmux-split.vertical {
        flex-direction: column;
      }

      .tmux-split.horizontal {
        flex-direction: row;
      }

      .split-child {
        min-width: 0;
        min-height: 0;
        display: flex;
      }

      .split-divider {
        flex: none;
        width: 1px;
        background: var(--line-strong);
      }

      .tmux-split.vertical > .split-divider {
        width: auto;
        height: 1px;
      }

      .tmux-pane {
        min-width: 0;
        min-height: 0;
        width: 100%;
        position: relative;
        display: flex;
        flex-direction: column;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: #020617;
        color: #dbeafe;
        text-align: left;
        overflow: hidden;
      }

      .tmux-pane.active {
        box-shadow: inset 0 0 0 2px rgba(34, 211, 238, 0.8);
      }

      .tmux-pane:hover {
        background: #030b18;
      }

      .pane-overlay {
        position: absolute;
        top: 7px;
        right: 8px;
        z-index: 2;
        display: inline-flex;
        gap: 8px;
        padding: 3px 7px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 5px;
        background: rgba(2, 6, 23, 0.84);
        color: #cbd5e1;
        font:
          11px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .tmux-pane.active .pane-overlay {
        border-color: rgba(34, 211, 238, 0.65);
        color: #ecfeff;
      }

      .terminal-output {
        min-height: 0;
        flex: 1;
        overflow: hidden;
        padding: 15px 12px;
        font:
          13px/1.56 "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        color: #dbeafe;
      }

      .terminal-line {
        min-height: 20px;
        white-space: pre;
      }

      .cursor {
        display: inline-block;
        width: 8px;
        height: 16px;
        margin-left: 4px;
        background: #e2e8f0;
        vertical-align: -3px;
      }

      .tmux-status {
        height: 24px;
        flex: none;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 9px;
        background: #0e7490;
        color: #ecfeff;
        font:
          12px "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .status-right {
        margin-left: auto;
        opacity: 0.85;
      }

      .event-log {
        width: 250px;
        flex: none;
        display: flex;
        flex-direction: column;
        border-left: 1px solid var(--line);
        background: rgba(2, 6, 23, 0.62);
      }

      .event-log-header {
        height: 32px;
        flex: none;
        display: flex;
        align-items: center;
        padding: 0 10px;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
      }

      .event-log-body {
        min-height: 0;
        flex: 1;
        overflow: hidden;
        padding: 8px 10px;
      }

      .event-line {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        color: #cbd5e1;
        font:
          12px/1.7 "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .sidecar {
        width: clamp(380px, 35vw, 520px);
        min-width: 360px;
        display: flex;
        flex-direction: column;
        background: rgba(2, 6, 23, 0.98);
      }

      .sidecar-header {
        height: 48px;
        flex: none;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 10px;
        border-bottom: 1px solid var(--line);
      }

      .sidecar-tabs {
        display: flex;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .sidecar-tab {
        height: 28px;
        padding: 0 12px;
        background: #07111f;
        color: var(--muted);
      }

      .sidecar-tab.active {
        background: #1e293b;
        color: #f8fafc;
      }

      .sidecar-tools {
        margin-left: auto;
        display: flex;
        gap: 6px;
      }

      .preview-row {
        height: 42px;
        flex: none;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        border-bottom: 1px solid var(--line);
      }

      .preview-task {
        height: 27px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #07111f;
        color: var(--muted);
      }

      .panel-meta {
        color: var(--muted);
        font-size: 12px;
      }

      .readonly {
        margin-left: auto;
        padding: 4px 8px;
        border: 1px solid var(--line-strong);
        border-radius: 5px;
        color: #cbd5e1;
        font-size: 11px;
      }

      .preview-empty {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--muted);
      }

      .primary {
        height: 38px;
        padding: 0 18px;
        border-radius: 8px;
        background: #67e8f9;
        color: #082f49;
        font-weight: 650;
      }

      .toast {
        position: absolute;
        right: 16px;
        bottom: 16px;
        z-index: 20;
        padding: 9px 11px;
        border: 1px solid rgba(34, 211, 238, 0.36);
        border-radius: var(--radius);
        background: rgba(8, 47, 73, 0.92);
        color: #ecfeff;
        font-size: 12px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
