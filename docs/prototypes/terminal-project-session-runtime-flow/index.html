<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Runweave Project、Terminal Session、xterm、PTY/tmux、App 与统一事件系统架构图"
    />
    <title>Project · Terminal · xterm 现状架构</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --bg-soft: #050a18;
        --surface: #07101f;
        --surface-2: #0b1527;
        --surface-3: #101c31;
        --line: #1e2d46;
        --line-strong: #334765;
        --text: #e5edf8;
        --muted: #8fa0b8;
        --faint: #607089;
        --blue: #60a5fa;
        --cyan: #22d3ee;
        --violet: #a78bfa;
        --green: #34d399;
        --amber: #fbbf24;
        --rose: #fb7185;
        --radius: 14px;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          radial-gradient(circle at 12% -8%, rgba(34, 211, 238, 0.11), transparent 32rem),
          radial-gradient(circle at 90% 0%, rgba(167, 139, 250, 0.1), transparent 28rem),
          var(--bg);
        color: var(--text);
      }

      button {
        border: 0;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }

      code,
      .mono {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      .app-shell {
        min-height: 100vh;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 68px;
        padding: 11px clamp(18px, 3vw, 42px);
        border-bottom: 1px solid rgba(51, 71, 101, 0.72);
        background: rgba(2, 6, 23, 0.9);
        backdrop-filter: blur(18px);
      }

      .brand {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        flex: 0 0 auto;
        border: 1px solid rgba(34, 211, 238, 0.38);
        border-radius: 11px;
        background: linear-gradient(145deg, rgba(34, 211, 238, 0.16), rgba(96, 165, 250, 0.06));
        color: var(--cyan);
        box-shadow: inset 0 0 20px rgba(34, 211, 238, 0.04);
        font-size: 17px;
        font-weight: 800;
      }

      .brand-copy {
        min-width: 0;
      }

      .brand-copy strong,
      .brand-copy span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .brand-copy strong {
        font-size: 14px;
        letter-spacing: 0.01em;
      }

      .brand-copy span {
        margin-top: 2px;
        color: var(--muted);
        font-size: 11px;
      }

      .baseline {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 7px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 0 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(11, 21, 39, 0.82);
        color: var(--muted);
        font-size: 10px;
        white-space: nowrap;
      }

      .badge.scope {
        border-color: rgba(251, 191, 36, 0.26);
        color: #f8d675;
      }

      .page-grid {
        display: grid;
        grid-template-columns: 210px minmax(0, 1fr);
        min-height: calc(100vh - 68px);
      }

      .sidebar {
        position: sticky;
        top: 68px;
        align-self: start;
        height: calc(100vh - 68px);
        padding: 24px 16px;
        border-right: 1px solid var(--line);
        background: rgba(3, 8, 22, 0.72);
      }

      .sidebar-label {
        margin: 0 10px 12px;
        color: var(--faint);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .view-nav {
        display: grid;
        gap: 6px;
      }

      .view-button {
        display: grid;
        grid-template-columns: 25px 1fr;
        align-items: center;
        gap: 8px;
        width: 100%;
        min-height: 42px;
        padding: 7px 10px;
        border: 1px solid transparent;
        border-radius: 10px;
        background: transparent;
        color: var(--muted);
        text-align: left;
        transition: 140ms ease;
      }

      .view-button:hover {
        border-color: var(--line);
        background: rgba(16, 28, 49, 0.72);
        color: var(--text);
      }

      .view-button.active {
        border-color: rgba(34, 211, 238, 0.27);
        background: rgba(34, 211, 238, 0.09);
        color: #dffaff;
      }

      .view-number {
        color: var(--faint);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 10px;
      }

      .view-button.active .view-number {
        color: var(--cyan);
      }

      .sidebar-note {
        position: absolute;
        right: 16px;
        bottom: 22px;
        left: 16px;
        padding: 12px;
        border: 1px solid rgba(251, 191, 36, 0.18);
        border-radius: 10px;
        background: rgba(251, 191, 36, 0.05);
        color: #c5b174;
        font-size: 10px;
        line-height: 1.55;
      }

      .content {
        min-width: 0;
        padding: clamp(26px, 4vw, 54px);
      }

      .content-inner {
        width: min(1480px, 100%);
        margin: 0 auto;
      }

      .view-intro {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 28px;
        margin-bottom: 28px;
      }

      .view-intro-copy {
        max-width: 880px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--cyan);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.2em;
      }

      .view-intro h1 {
        margin: 0;
        font-size: clamp(25px, 3vw, 42px);
        line-height: 1.13;
        letter-spacing: -0.035em;
      }

      .view-intro p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      .view-index {
        color: rgba(143, 160, 184, 0.2);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: clamp(38px, 6vw, 72px);
        font-weight: 800;
        line-height: 0.9;
      }

      .facts-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 22px;
      }

      .fact {
        min-width: 0;
        padding: 15px 16px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: linear-gradient(160deg, rgba(11, 21, 39, 0.92), rgba(7, 16, 31, 0.78));
      }

      .fact-label {
        color: var(--faint);
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .fact-value {
        margin-top: 7px;
        color: var(--text);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 14px;
        font-weight: 700;
      }

      .fact-detail {
        margin-top: 6px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.5;
      }

      .architecture {
        position: relative;
        display: grid;
        gap: 12px;
      }

      .lane {
        position: relative;
        display: grid;
        grid-template-columns: 128px minmax(0, 1fr);
        gap: 14px;
        align-items: stretch;
      }

      .lane + .lane::before {
        content: "↓";
        position: absolute;
        top: -20px;
        left: 53px;
        z-index: 2;
        color: var(--line-strong);
        font-family: monospace;
        font-size: 16px;
      }

      .lane-label {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 14px;
        border-right: 1px solid var(--line);
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        line-height: 1.45;
        text-align: right;
      }

      .lane-nodes {
        display: grid;
        grid-template-columns: repeat(var(--columns), minmax(190px, 1fr));
        gap: 10px;
      }

      .node {
        position: relative;
        min-width: 0;
        min-height: 125px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        color: inherit;
        text-align: left;
        transition: 140ms ease;
      }

      .node:hover,
      .node.selected {
        transform: translateY(-1px);
        border-color: var(--node-color, var(--cyan));
        background: linear-gradient(150deg, color-mix(in srgb, var(--node-color, var(--cyan)) 9%, var(--surface)), var(--surface));
        box-shadow: 0 16px 35px rgba(0, 0, 0, 0.17);
      }

      .node::after {
        content: "";
        position: absolute;
        top: 0;
        right: 14px;
        left: 14px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--node-color, var(--cyan)), transparent);
        opacity: 0.45;
      }

      .tone-blue { --node-color: var(--blue); }
      .tone-cyan { --node-color: var(--cyan); }
      .tone-violet { --node-color: var(--violet); }
      .tone-green { --node-color: var(--green); }
      .tone-amber { --node-color: var(--amber); }
      .tone-rose { --node-color: var(--rose); }

      .node-kind {
        color: var(--node-color, var(--cyan));
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .node h3 {
        margin: 9px 0 6px;
        font-size: 14px;
        line-height: 1.35;
      }

      .node p {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.5;
      }

      .detail-drawer {
        margin-top: 18px;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        background: linear-gradient(145deg, rgba(11, 21, 39, 0.96), rgba(5, 10, 24, 0.96));
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .detail-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 15px 18px;
        border-bottom: 1px solid var(--line);
      }

      .detail-header strong {
        font-size: 13px;
      }

      .detail-header span {
        color: var(--cyan);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 10px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
      }

      .detail-section {
        padding: 16px 18px 18px;
      }

      .detail-section + .detail-section {
        border-left: 1px solid var(--line);
      }

      .mini-heading {
        margin: 0 0 10px;
        color: var(--faint);
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .clean-list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.6;
      }

      .clean-list li + li {
        margin-top: 5px;
      }

      .code-list {
        display: grid;
        gap: 7px;
      }

      .code-line {
        padding: 7px 9px;
        border: 1px solid rgba(51, 71, 101, 0.64);
        border-radius: 7px;
        background: rgba(2, 6, 23, 0.68);
        color: #b7c7db;
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 9px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .relation-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
        margin-top: 18px;
      }

      .relation-strip div {
        padding: 11px 12px;
        border: 1px dashed var(--line-strong);
        border-radius: 9px;
        color: var(--muted);
        font-size: 10px;
        line-height: 1.5;
      }

      .scenario-bar,
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 18px;
      }

      .scenario-button,
      .filter-button {
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: var(--surface);
        color: var(--muted);
        font-size: 11px;
      }

      .scenario-button:hover,
      .filter-button:hover,
      .scenario-button.active,
      .filter-button.active {
        border-color: rgba(34, 211, 238, 0.46);
        background: rgba(34, 211, 238, 0.09);
        color: #e2fbff;
      }

      .scenario-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 14px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: var(--surface);
      }

      .scenario-head h2 {
        margin: 0;
        font-size: 15px;
      }

      .scenario-head p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 11px;
      }

      .transport-pill {
        flex: 0 0 auto;
        padding: 5px 9px;
        border: 1px solid rgba(52, 211, 153, 0.3);
        border-radius: 999px;
        background: rgba(52, 211, 153, 0.08);
        color: var(--green);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 9px;
      }

      .sequence {
        display: grid;
        grid-template-columns: repeat(var(--steps), minmax(175px, 1fr));
        gap: 22px;
        overflow-x: auto;
        padding: 2px 2px 14px;
      }

      .step {
        position: relative;
        min-width: 175px;
        min-height: 190px;
        padding: 15px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: linear-gradient(160deg, var(--surface-2), var(--surface));
        text-align: left;
      }

      .step:not(:last-child)::after {
        content: "→";
        position: absolute;
        top: 50%;
        right: -18px;
        color: var(--line-strong);
        font-family: monospace;
        font-size: 18px;
        transform: translateY(-50%);
      }

      .step-index {
        color: var(--cyan);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 9px;
        font-weight: 800;
      }

      .step-actor {
        margin-top: 11px;
        color: var(--faint);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .step h3 {
        margin: 6px 0 8px;
        font-size: 13px;
        line-height: 1.42;
      }

      .step p {
        margin: 0;
        color: var(--muted);
        font-size: 10px;
        line-height: 1.55;
      }

      .step-payload {
        margin-top: 12px;
        padding: 7px 8px;
        border: 1px solid rgba(51, 71, 101, 0.64);
        border-radius: 7px;
        background: rgba(2, 6, 23, 0.62);
        color: #a8dce4;
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 8.5px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .step-source {
        margin-top: 10px;
        color: var(--faint);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 8px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .channel-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .channel-card {
        position: relative;
        padding: 17px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: linear-gradient(160deg, var(--surface-2), var(--surface));
        overflow: hidden;
      }

      .channel-card::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 2px;
        background: var(--node-color, var(--cyan));
      }

      .channel-card h2 {
        margin: 8px 0 4px;
        font-size: 15px;
      }

      .endpoint {
        color: var(--node-color, var(--cyan));
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 10px;
      }

      .channel-meta {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      .channel-meta div {
        padding-top: 8px;
        border-top: 1px solid var(--line);
      }

      .channel-meta dt {
        color: var(--faint);
        font-size: 8px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .channel-meta dd {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 10px;
        line-height: 1.5;
      }

      .message-list {
        display: grid;
        gap: 6px;
        margin-top: 14px;
      }

      .message-list code {
        display: block;
        padding: 7px 8px;
        border-radius: 7px;
        background: rgba(2, 6, 23, 0.7);
        color: #b5c7dc;
        font-size: 8.5px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .section-title {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 30px 0 13px;
      }

      .section-title::after {
        content: "";
        height: 1px;
        flex: 1;
        background: var(--line);
      }

      .section-title h2 {
        margin: 0;
        font-size: 13px;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(7, 16, 31, 0.82);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 10px;
      }

      th,
      td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #0a1425;
        color: var(--faint);
        font-size: 8px;
        font-weight: 800;
        letter-spacing: 0.11em;
        text-transform: uppercase;
      }

      td {
        color: var(--muted);
        line-height: 1.5;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      tbody tr:hover td {
        background: rgba(34, 211, 238, 0.025);
      }

      .table-path,
      .table-source {
        font-family: "SFMono-Regular", Consolas, monospace;
        overflow-wrap: anywhere;
      }

      .table-path {
        color: #c7eaf0;
      }

      .table-source {
        color: var(--faint);
        font-size: 8.5px;
      }

      .relation-map {
        display: grid;
        gap: 8px;
      }

      .relation-row {
        display: grid;
        grid-template-columns: minmax(145px, 0.8fr) 90px minmax(145px, 0.8fr) minmax(240px, 1.5fr);
        gap: 10px;
        align-items: center;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--surface);
      }

      .relation-object {
        padding: 8px 10px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: var(--surface-2);
        font-size: 11px;
        font-weight: 700;
      }

      .cardinality {
        color: var(--cyan);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 10px;
        text-align: center;
      }

      .relation-meaning {
        color: var(--muted);
        font-size: 10px;
        line-height: 1.5;
      }

      .count-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .count-card {
        min-width: 0;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: var(--surface);
      }

      .count-value {
        color: var(--cyan);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 24px;
        font-weight: 800;
      }

      .count-card h3 {
        margin: 8px 0 4px;
        font-size: 11px;
      }

      .count-card p {
        margin: 0;
        color: var(--muted);
        font-size: 9px;
        line-height: 1.5;
      }

      .count-card .source {
        margin-top: 10px;
        color: var(--faint);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 7.5px;
        overflow-wrap: anywhere;
      }

      .empty-state,
      .load-error {
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.7;
      }

      .load-error {
        margin: 30px;
        border-color: rgba(251, 113, 133, 0.32);
        color: #fecdd3;
        white-space: pre-wrap;
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 42px;
        padding-top: 16px;
        border-top: 1px solid var(--line);
        color: var(--faint);
        font-size: 9px;
      }

      .footer code {
        color: var(--muted);
      }

      @media (max-width: 1180px) {
        .page-grid {
          grid-template-columns: 170px minmax(0, 1fr);
        }
        .lane {
          grid-template-columns: 105px minmax(0, 1fr);
        }
        .lane-nodes {
          grid-template-columns: repeat(2, minmax(180px, 1fr));
        }
        .relation-strip,
        .count-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .channel-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 760px) {
        .topbar {
          position: relative;
          align-items: flex-start;
          flex-direction: column;
        }
        .baseline {
          justify-content: flex-start;
        }
        .page-grid {
          display: block;
        }
        .sidebar {
          position: sticky;
          top: 0;
          z-index: 25;
          height: auto;
          padding: 9px 12px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
          overflow-x: auto;
          background: rgba(2, 6, 23, 0.94);
        }
        .sidebar-label,
        .sidebar-note {
          display: none;
        }
        .view-nav {
          display: flex;
          width: max-content;
        }
        .view-button {
          width: auto;
          min-height: 36px;
          grid-template-columns: 20px auto;
          white-space: nowrap;
        }
        .content {
          padding: 25px 16px 40px;
        }
        .view-intro {
          align-items: flex-start;
        }
        .view-index {
          display: none;
        }
        .facts-grid,
        .detail-grid,
        .relation-strip,
        .count-grid {
          grid-template-columns: 1fr;
        }
        .lane {
          grid-template-columns: 1fr;
        }
        .lane + .lane::before {
          display: none;
        }
        .lane-label {
          justify-content: flex-start;
          padding: 7px 0 2px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
          text-align: left;
        }
        .lane-nodes {
          grid-template-columns: 1fr;
        }
        .detail-section + .detail-section {
          border-top: 1px solid var(--line);
          border-left: 0;
        }
        .scenario-head,
        .footer {
          align-items: flex-start;
          flex-direction: column;
        }
        .relation-row {
          grid-template-columns: 1fr;
        }
        .cardinality {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main id="app" class="app-shell"></main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
