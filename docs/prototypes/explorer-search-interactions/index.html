<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Explorer 快捷浮层原型</title>
    <style>
      :root {
        color-scheme: dark;
        --slate-950: #020617;
        --slate-900: #0f172a;
        --slate-850: #131c2f;
        --slate-800: #1e293b;
        --slate-750: #263449;
        --slate-700: #334155;
        --slate-500: #64748b;
        --slate-400: #94a3b8;
        --slate-300: #cbd5e1;
        --slate-200: #e2e8f0;
        --slate-100: #f1f5f9;
        --emerald: #34d399;
        --amber: #fbbf24;
        --rose: #fb7185;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #050814;
        color: var(--slate-100);
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        color: inherit;
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 44px 1fr;
        background: var(--slate-950);
      }

      .prototype-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 14px;
        border-bottom: 1px solid var(--slate-800);
        background: #070d1c;
      }

      .prototype-title,
      .prototype-session {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .prototype-title span,
      .prototype-session span,
      .muted {
        color: var(--slate-500);
        font-size: 12px;
      }

      .prototype-title strong,
      .prototype-session strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
      }

      .terminal-workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 560px;
      }

      .terminal-surface {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: 36px 1fr;
        background: #050917;
      }

      .terminal-tabbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        border-bottom: 1px solid var(--slate-800);
      }

      .terminal-tab {
        height: 26px;
        max-width: 260px;
        padding: 0 10px;
        border: 1px solid var(--slate-800);
        border-radius: 7px;
        background: var(--slate-900);
        color: var(--slate-400);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 12px;
      }

      .terminal-tab.is-active {
        border-color: #10b981;
        color: var(--slate-100);
      }

      .terminal-screen {
        padding: 18px;
        color: var(--slate-300);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
      }

      .preview-sidecar {
        position: relative;
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr;
        border-left: 1px solid var(--slate-800);
        background: var(--slate-950);
      }

      .sidecar-header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        padding: 6px 8px;
        border-bottom: 1px solid var(--slate-800);
        background: var(--slate-950);
      }

      .tool-tabs,
      .preview-tabs {
        display: inline-flex;
        align-items: center;
        width: max-content;
        max-width: 100%;
        border: 1px solid var(--slate-800);
        border-radius: 6px;
        background: rgba(15, 23, 42, 0.7);
        padding: 2px;
      }

      .tool-tabs button,
      .preview-tabs button {
        height: 24px;
        padding: 0 8px;
        border-radius: 4px;
        background: transparent;
        color: var(--slate-400);
        font-size: 12px;
      }

      .tool-tabs button.is-active,
      .preview-tabs button.is-active {
        background: var(--slate-700);
        color: var(--slate-100);
      }

      .icon-actions {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .icon-actions button,
      .floating-search,
      .explorer-toolbar button,
      .file-preview-header button {
        height: 28px;
        padding: 0 8px;
        border: 1px solid var(--slate-800);
        border-radius: 6px;
        background: var(--slate-900);
        color: var(--slate-300);
        font-size: 12px;
      }

      .preview-tabs {
        grid-column: 1 / -1;
      }

      .preview-body {
        min-height: 0;
        display: grid;
        grid-template-columns: 240px minmax(0, 1fr);
      }

      .explorer-pane {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: 38px 1fr;
        border-right: 1px solid var(--slate-800);
        background: var(--slate-950);
      }

      .explorer-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 0 8px;
        border-bottom: 1px solid var(--slate-800);
      }

      .explorer-toolbar span {
        color: var(--slate-400);
        font-size: 12px;
      }

      .tree-list {
        min-height: 0;
        overflow: auto;
        padding: 6px 4px;
      }

      .tree-row {
        width: 100%;
        min-width: 0;
        height: 28px;
        display: flex;
        align-items: center;
        gap: 4px;
        border-radius: 3px;
        background: transparent;
        color: var(--slate-300);
        text-align: left;
        font-size: 12px;
        line-height: 28px;
        user-select: none;
      }

      .tree-row:hover,
      .tree-row.is-focused {
        background: rgba(30, 41, 59, 0.4);
        color: var(--slate-200);
      }

      .tree-row.is-selected {
        background: rgba(51, 65, 85, 0.6);
        color: var(--slate-100);
      }

      .tree-chevron {
        width: 14px;
        flex: none;
        color: var(--slate-500);
        text-align: center;
      }

      .tree-icon {
        width: 54px;
        flex: none;
        color: var(--amber);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tree-name {
        min-width: 0;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-preview {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: 48px 1fr;
        background: #070d1a;
      }

      .file-preview-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 0 12px;
        border-bottom: 1px solid var(--slate-800);
      }

      .file-title {
        min-width: 0;
      }

      .file-title strong,
      .file-title span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-title strong {
        font-size: 12px;
      }

      .file-title span {
        margin-top: 3px;
        color: var(--slate-500);
        font-size: 11px;
      }

      .editor-surface {
        min-height: 0;
        overflow: auto;
        padding: 12px 0;
        color: var(--slate-300);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
      }

      .code-line {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr);
        min-height: 22px;
      }

      .code-line span {
        color: var(--slate-500);
        text-align: right;
        padding-right: 12px;
      }

      .code-line code {
        white-space: pre;
      }

      .floating-search {
        position: absolute;
        right: 12px;
        bottom: 12px;
        z-index: 20;
      }

      .palette-backdrop {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding-top: min(14vh, 112px);
        background: rgba(2, 6, 23, 0.64);
      }

      .command-palette {
        width: min(780px, calc(100vw - 48px));
        max-height: min(620px, calc(100vh - 132px));
        display: grid;
        grid-template-rows: auto auto auto minmax(0, 1fr) auto;
        border: 1px solid var(--slate-700);
        border-radius: 10px;
        background: var(--slate-950);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        overflow: hidden;
      }

      .command-title {
        min-height: 42px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 0 12px;
        border-bottom: 1px solid var(--slate-800);
      }

      .command-title strong {
        font-size: 13px;
      }

      .command-title span {
        color: var(--slate-500);
        font-size: 12px;
      }

      .command-tabs {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 10px 0;
      }

      .command-tabs button {
        height: 28px;
        padding: 0 10px;
        border-radius: 6px;
        background: transparent;
        color: var(--slate-400);
        font-size: 12px;
      }

      .command-tabs button.is-active {
        background: var(--slate-800);
        color: var(--slate-100);
      }

      .command-input-row {
        padding: 10px;
        border-bottom: 1px solid var(--slate-800);
      }

      .command-input {
        width: 100%;
        height: 40px;
        border: 1px solid var(--slate-700);
        border-radius: 8px;
        background: var(--slate-900);
        color: var(--slate-100);
        outline: none;
        padding: 0 12px;
        font-size: 14px;
      }

      .command-input:focus {
        border-color: var(--slate-400);
      }

      .command-list {
        min-height: 0;
        overflow: auto;
        padding: 8px;
      }

      .command-section {
        padding: 4px 10px 8px;
        color: var(--slate-500);
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .command-item {
        width: 100%;
        min-height: 54px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-radius: 8px;
        background: transparent;
        color: var(--slate-200);
        padding: 8px 10px;
        text-align: left;
      }

      .command-item.has-match {
        min-height: 72px;
      }

      .command-item.is-selected {
        background: rgba(15, 23, 42, 0.8);
      }

      .command-item:hover {
        background: rgba(30, 41, 59, 0.8);
      }

      .command-main {
        min-width: 0;
        flex: 1;
      }

      .command-icon {
        width: 42px;
        flex: none;
        color: var(--slate-500);
        font-size: 11px;
        text-align: center;
      }

      .command-name,
      .command-dir,
      .command-match {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .command-name {
        font-size: 13px;
        font-weight: 600;
      }

      .command-dir,
      .command-match {
        margin-top: 3px;
        color: var(--slate-500);
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .command-badge {
        flex: none;
        border: 1px solid var(--slate-700);
        border-radius: 5px;
        color: var(--slate-400);
        padding: 2px 6px;
        font-size: 10px;
        text-transform: uppercase;
      }

      .command-empty {
        padding: 28px 10px;
        color: var(--slate-400);
        font-size: 13px;
      }

      .command-footer {
        min-height: 34px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border-top: 1px solid var(--slate-800);
      }

      .command-footer span {
        border: 1px solid var(--slate-800);
        border-radius: 5px;
        color: var(--slate-500);
        padding: 2px 6px;
        font-size: 11px;
      }

      mark {
        background: rgba(251, 191, 36, 0.2);
        color: #fde68a;
        border-radius: 3px;
        padding: 0 2px;
      }

      @media (max-width: 980px) {
        .terminal-workspace {
          grid-template-columns: 1fr;
        }

        .terminal-surface {
          display: none;
        }

        .preview-sidecar {
          border-left: 0;
        }
      }

      @media (max-width: 700px) {
        .preview-body {
          grid-template-columns: 1fr;
        }

        .explorer-pane {
          min-height: 320px;
          border-right: 0;
          border-bottom: 1px solid var(--slate-800);
        }

        .command-palette {
          width: calc(100% - 24px);
        }
      }
    </style>
  </head>
  <body>
    <main id="app" class="app"></main>
    <script type="module">
      const version = Date.now();
      await import(`./app.js?v=${version}`);
    </script>
  </body>
</html>
