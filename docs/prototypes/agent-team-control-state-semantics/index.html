<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Team 控制状态语义</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        --bg: #020617;
        --panel: #0f172a;
        --surface: #111827;
        --line: #273449;
        --text: #e2e8f0;
        --muted: #94a3b8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }
      button,
      textarea {
        font: inherit;
      }
      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }
      .terminal {
        width: min(1120px, 100%);
        height: 720px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        overflow: hidden;
        border: 1px solid #1e293b;
        border-radius: 12px;
        background: #030712;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }
      .workspace {
        padding: 24px;
        background:
          radial-gradient(
            circle at 28% 10%,
            rgba(30, 64, 175, 0.15),
            transparent 38%
          ),
          #030712;
      }
      .terminal-lines {
        color: #64748b;
        font:
          12px/1.8 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
      }
      .terminal-lines strong {
        color: #cbd5e1;
        font-weight: 500;
      }
      .side-panel {
        min-width: 0;
        border-left: 1px solid #1e293b;
        background: var(--panel);
        display: flex;
        flex-direction: column;
      }
      .header {
        height: 46px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        border-bottom: 1px solid #1e293b;
      }
      .header-title {
        font-size: 12px;
        font-weight: 600;
      }
      .badge {
        border-radius: 6px;
        padding: 3px 7px;
        font-size: 10px;
        font-weight: 650;
      }
      .content {
        min-height: 0;
        overflow: auto;
        padding: 12px;
      }
      .control-card {
        border: 1px solid;
        border-radius: 9px;
        padding: 12px;
      }
      .control-title {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        font-weight: 700;
      }
      .icon {
        width: 15px;
        height: 15px;
        display: grid;
        place-items: center;
      }
      .spinner {
        border: 2px solid currentColor;
        border-right-color: transparent;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .summary {
        margin: 8px 0 0;
        font-size: 11px;
        line-height: 1.55;
      }
      .meta {
        margin-top: 9px;
        display: grid;
        gap: 4px;
        font-size: 10px;
        opacity: 0.78;
      }
      .reason {
        width: 100%;
        min-height: 58px;
        margin-top: 10px;
        resize: none;
        border: 1px solid #475569;
        border-radius: 6px;
        background: #020617;
        padding: 7px 8px;
        color: var(--text);
        font-size: 11px;
        outline: none;
      }
      .actions {
        margin-top: 11px;
        display: grid;
        grid-template-columns: repeat(var(--columns), minmax(0, 1fr));
        gap: 7px;
      }
      .action {
        min-height: 32px;
        border: 1px solid currentColor;
        border-radius: 6px;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font-size: 10px;
      }
      .action.primary {
        background: currentColor;
      }
      .action.primary span {
        color: #07111f;
        font-weight: 700;
      }
      .recovering {
        border-color: #0e7490;
        background: rgba(8, 145, 178, 0.12);
        color: #a5f3fc;
      }
      .recovery {
        border-color: #a16207;
        background: rgba(180, 83, 9, 0.13);
        color: #fde68a;
      }
      .decision {
        border-color: #be123c;
        background: rgba(159, 18, 57, 0.16);
        color: #fecdd3;
      }
      .badge.recovering {
        background: rgba(6, 182, 212, 0.16);
        color: #67e8f9;
      }
      .badge.recovery {
        background: rgba(245, 158, 11, 0.16);
        color: #fcd34d;
      }
      .badge.decision {
        background: rgba(244, 63, 94, 0.16);
        color: #fda4af;
      }
      .loop {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: rgba(2, 6, 23, 0.5);
      }
      .loop-row {
        display: flex;
        justify-content: space-between;
        padding: 3px 0;
        color: var(--muted);
        font-size: 10px;
      }
      @media (max-width: 760px) {
        .terminal {
          grid-template-columns: 1fr;
          height: auto;
        }
        .workspace {
          display: none;
        }
        .side-panel {
          min-height: 620px;
          border-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="terminal">
        <div class="workspace">
          <div class="terminal-lines">
            <strong>Runweave terminal</strong><br />$ rw agent-team status
            atr_control_plane<br />observing worker dispatch and durable
            transition receipts…
          </div>
        </div>
        <aside class="side-panel" id="app"></aside>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
