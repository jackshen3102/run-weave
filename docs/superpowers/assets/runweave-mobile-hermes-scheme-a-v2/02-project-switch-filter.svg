<text x="75" y="511" text-anchor="middle" font-size="10" font-family="Arial, PingFang SC" fill="#64748b">run-weave</text>
<text x="123" y="504" font-size="18" fill="#94a3b8">→</text>
<rect x="127" y="470" width="82" height="54" rx="15" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="168" y="494" text-anchor="middle" font-size="12" font-weight="700" font-family="Arial, PingFang SC" fill="#1d4ed8">筛状态</text>
<text x="168" y="511" text-anchor="middle" font-size="10" font-family="Arial, PingFang SC" fill="#64748b">等待输入</text>
<text x="216" y="504" font-size="18" fill="#94a3b8">→</text>
<rect x="220" y="470" width="82" height="54" rx="15" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="261" y="494" text-anchor="middle" font-size="12" font-weight="700" font-family="Arial, PingFang SC" fill="#1d4ed8">看卡片</text>
<text x="261" y="511" text-anchor="middle" font-size="10" font-family="Arial, PingFang SC" fill="#64748b">2 个</text>
<text x="309" y="504" font-size="18" fill="#94a3b8">→</text>
<rect x="313" y="470" width="82" height="54" rx="15" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="354" y="494" text-anchor="middle" font-size="12" font-weight="700" font-family="Arial, PingFang SC" fill="#1d4ed8">交给AI</text>
<text x="354" y="511" text-anchor="middle" font-size="10" font-family="Arial, PingFang SC" fill="#64748b">Hermes</text>
