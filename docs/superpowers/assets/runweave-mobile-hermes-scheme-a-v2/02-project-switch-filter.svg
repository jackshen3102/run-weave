<rect x="34" y="192" width="107" height="32" rx="16" fill="#2563eb"/>
<text x="87.5" y="213" text-anchor="middle" font-size="12" font-family="Arial, PingFang SC" fill="#fff">run-weave</text>
<rect x="149" y="192" width="98" height="32" rx="16" fill="#f1f5f9"/>
<text x="198.0" y="213" text-anchor="middle" font-size="12" font-family="Arial, PingFang SC" fill="#475569">space-v3</text>
<rect x="255" y="192" width="80" height="32" rx="16" fill="#f1f5f9"/>
<text x="295.0" y="213" text-anchor="middle" font-size="12" font-family="Arial, PingFang SC" fill="#475569">hermes</text>
<rect x="343" y="192" width="58" height="32" rx="16" fill="#f1f5f9"/>
<text x="372.0" y="213" text-anchor="middle" font-size="12" font-family="Arial, PingFang SC" fill="#475569">全部</text>
<text x="34" y="240" font-size="17" font-weight="700" font-family="Arial, PingFang SC" fill="#0f172a">状态筛选</text>
<rect x="34" y="258" width="62" height="32" rx="16" fill="#2563eb"/>
<text x="65.0" y="279" text-anchor="middle" font-size="12" font-family="Arial, PingFang SC" fill="#fff">需要处理</text>
<rect x="104" y="258" width="71" height="32" rx="16" fill="#f1f5f9"/>
<text x="139.5" y="279" text-anchor="middle" font-size="12" font-family="Arial, PingFang SC" fill="#475569">AI执行中</text>
<rect x="183" y="258" width="62" height="32" rx="16" fill="#f1f5f9"/>
<text x="214.0" y="279" text-anchor="middle" font-size="12" font-family="Arial, PingFang SC" fill="#475569">等待输入</text>
<rect x="253" y="258" width="58" height="32" rx="16" fill="#f1f5f9"/>
<text x="282.0" y="279" text-anchor="middle" font-size="12" font-family="Arial, PingFang SC" fill="#475569">空闲</text>
<rect x="34" y="306" width="362" height="150" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
<rect x="34" y="306" width="6" height="150" rx="3" fill="#2563eb"/>
<text x="54" y="334" font-size="16" font-weight="700" font-family="Arial, PingFang SC" fill="#0f172a">筛选逻辑</text>
<rect x="316" y="318" width="70" height="26" rx="13" fill="#dbeafe"/>
<text x="351.0" y="336" text-anchor="middle" font-size="12" font-weight="700" font-family="Arial, PingFang SC" fill="#2563eb">MVP</text>
<text x="54" y="360" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">需要处理 = 等待输入 + 失败 + 可能卡住</text>
<text x="54" y="379" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">AI执行中 = codex/claude 且最近有输出</text>
<text x="54" y="398" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">空闲 = /bin/zsh 且 tail 是 shell prompt</text>
<text x="54" y="417" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">默认排序：需要处理 &gt; 执行中 &gt; 最近活跃 &gt; 空闲</text>
<rect x="54" y="418" width="72" height="28" rx="14" fill="#2563eb" stroke="#2563eb"/>
<text x="90.0" y="437" text-anchor="middle" font-size="12" font-family="Arial, PingFang SC" fill="#fff">应用筛选</text>
