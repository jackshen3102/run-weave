<svg xmlns="http://www.w3.org/2000/svg" width="430" height="930" viewBox="0 0 430 930">
<defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16"/></filter></defs>
<rect width="430" height="930" rx="34" fill="#f6f8fb"/>
<rect x="18" y="14" width="394" height="902" rx="30" fill="#ffffff" filter="url(#shadow)"/>
<rect x="18" y="14" width="394" height="84" rx="30" fill="#0f172a"/>
<text x="38" y="51" font-size="22" font-weight="700" font-family="Arial, PingFang SC" fill="#fff">状态判断</text>
<text x="38" y="77" font-size="13" font-family="Arial, PingFang SC" fill="#cbd5e1">activeCommand=codex 只是开始，还要判断是否等待输入</text>
<rect x="34" y="116" width="82" height="54" rx="15" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="75" y="140" text-anchor="middle" font-size="12" font-weight="700" font-family="Arial, PingFang SC" fill="#1d4ed8">session</text>
<text x="75" y="157" text-anchor="middle" font-size="10" font-family="Arial, PingFang SC" fill="#64748b">running</text>
<text x="123" y="150" font-size="18" fill="#94a3b8">→</text>
<rect x="127" y="116" width="82" height="54" rx="15" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="168" y="140" text-anchor="middle" font-size="12" font-weight="700" font-family="Arial, PingFang SC" fill="#1d4ed8">command</text>
<text x="168" y="157" text-anchor="middle" font-size="10" font-family="Arial, PingFang SC" fill="#64748b">codex</text>
<text x="216" y="150" font-size="18" fill="#94a3b8">→</text>
<rect x="220" y="116" width="82" height="54" rx="15" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="261" y="140" text-anchor="middle" font-size="12" font-weight="700" font-family="Arial, PingFang SC" fill="#1d4ed8">tail</text>
<text x="261" y="157" text-anchor="middle" font-size="10" font-family="Arial, PingFang SC" fill="#64748b">prompt?</text>
<text x="309" y="150" font-size="18" fill="#94a3b8">→</text>
<rect x="313" y="116" width="82" height="54" rx="15" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="354" y="140" text-anchor="middle" font-size="12" font-weight="700" font-family="Arial, PingFang SC" fill="#1d4ed8">state</text>
<text x="354" y="157" text-anchor="middle" font-size="10" font-family="Arial, PingFang SC" fill="#64748b">等待输入</text>
<rect x="34" y="190" width="362" height="145" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
<rect x="34" y="190" width="6" height="145" rx="3" fill="#f59e0b"/>
<text x="54" y="218" font-size="16" font-weight="700" font-family="Arial, PingFang SC" fill="#0f172a">规则 1：Codex 等待输入</text>
<rect x="316" y="202" width="70" height="26" rx="13" fill="#fef3c7"/>
<text x="351.0" y="220" text-anchor="middle" font-size="12" font-weight="700" font-family="Arial, PingFang SC" fill="#b45309">黄色</text>
<text x="54" y="244" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">activeCommand = codex</text>
<text x="54" y="263" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">tail 末尾检测到 › prompt</text>
<text x="54" y="282" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">最近 30-60 秒无新增输出</text>
<text x="54" y="301" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">结果：agent_waiting_input</text>
<rect x="34" y="349" width="362" height="145" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
<rect x="34" y="349" width="6" height="145" rx="3" fill="#3b82f6"/>
<text x="54" y="377" font-size="16" font-weight="700" font-family="Arial, PingFang SC" fill="#0f172a">规则 2：Codex 正在执行</text>
<rect x="316" y="361" width="70" height="26" rx="13" fill="#dbeafe"/>
<text x="351.0" y="379" text-anchor="middle" font-size="12" font-weight="700" font-family="Arial, PingFang SC" fill="#1d4ed8">蓝色</text>
<text x="54" y="403" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">activeCommand = codex</text>
<text x="54" y="422" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">tail 最近持续变化</text>
<text x="54" y="441" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">没有输入 prompt</text>
<text x="54" y="460" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">结果：agent_running，不要插入新指令</text>
<rect x="34" y="508" width="362" height="145" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
<rect x="34" y="508" width="6" height="145" rx="3" fill="#22c55e"/>
<text x="54" y="536" font-size="16" font-weight="700" font-family="Arial, PingFang SC" fill="#0f172a">规则 3：空闲 shell</text>
<rect x="316" y="520" width="70" height="26" rx="13" fill="#dcfce7"/>
<text x="351.0" y="538" text-anchor="middle" font-size="12" font-weight="700" font-family="Arial, PingFang SC" fill="#15803d">绿色</text>
<text x="54" y="562" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">activeCommand = /bin/zsh</text>
<text x="54" y="581" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">tail 是 shell prompt</text>
<text x="54" y="600" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">结果：idle_shell，可执行新命令</text>
</svg>