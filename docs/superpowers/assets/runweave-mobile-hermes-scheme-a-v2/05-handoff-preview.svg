<text x="54" y="170" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">发送到：飞书 Hermes 对话</text>
<text x="54" y="189" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">动作：复制草稿 或 打开飞书</text>
<text x="54" y="208" font-size="12.5" font-family="Arial, PingFang SC" fill="#475569">包含：终端 ID + 状态 + tail + 操作原则</text>
