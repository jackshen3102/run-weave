<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1440"
  height="900"
  viewBox="0 0 1440 900"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Terminal Preview file editing flow</title>
  <desc id="desc">
    Wireframe showing the Preview Files tab with an editable Monaco source pane,
    dirty state, save control, and conflict handling.
  </desc>
  <defs>
    <style>
      .ui {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          sans-serif;
      }
      .mono {
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      }
      .muted {
        fill: #94a3b8;
      }
      .text {
        fill: #e2e8f0;
      }
      .accent {
        fill: #22d3ee;
      }
      .warn {
        fill: #fbbf24;
      }
      .ok {
        fill: #86efac;
      }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#0f172a" />
  <rect x="28" y="28" width="1384" height="844" rx="18" fill="#020617" stroke="#1e293b" />
  <rect x="28" y="28" width="1384" height="72" rx="18" fill="#111827" />
  <circle cx="58" cy="58" r="7" fill="#ef4444" />
  <circle cx="82" cy="58" r="7" fill="#f59e0b" />
  <circle cx="106" cy="58" r="7" fill="#22c55e" />
  <rect x="142" y="43" width="150" height="30" rx="15" fill="#f8fafc" />
  <text x="166" y="63" class="ui" font-size="13" font-weight="700" fill="#020617">Runweave</text>
  <rect x="310" y="43" width="130" height="30" rx="15" fill="#1e293b" />
  <text x="335" y="63" class="ui muted" font-size="13">Terminal 1</text>

  <rect x="52" y="124" width="820" height="724" rx="12" fill="#020617" stroke="#334155" />
  <rect x="52" y="124" width="820" height="50" rx="12" fill="#0b1120" />
  <text x="82" y="155" class="ui muted" font-size="13">Terminal output stays visible when Preview is sidecar</text>
  <text x="82" y="218" class="mono text" font-size="15">$ pnpm dev</text>
  <text x="82" y="250" class="mono muted" font-size="15">VITE ready in 642 ms</text>
  <text x="82" y="282" class="mono muted" font-size="15">Local: http://localhost:5173</text>

  <rect x="894" y="124" width="494" height="724" rx="12" fill="#020617" stroke="#334155" />
  <rect x="894" y="124" width="494" height="48" rx="12" fill="#111827" />
  <rect x="912" y="136" width="76" height="24" rx="5" fill="#334155" />
  <text x="928" y="153" class="ui text" font-size="12" font-weight="700">Preview</text>
  <rect x="994" y="136" width="68" height="24" rx="5" fill="#1e293b" />
  <text x="1014" y="153" class="ui muted" font-size="12">Browser</text>
  <rect x="1264" y="136" width="30" height="24" rx="5" fill="#1e293b" />
  <text x="1273" y="153" class="ui text" font-size="12">S</text>
  <text x="1302" y="153" class="ui ok" font-size="12" font-weight="700">Save</text>
  <rect x="1350" y="136" width="24" height="24" rx="5" fill="#1e293b" />
  <text x="1358" y="153" class="ui text" font-size="12">X</text>

  <rect x="894" y="172" width="494" height="42" fill="#020617" stroke="#1e293b" />
  <rect x="912" y="182" width="78" height="22" rx="5" fill="#1e293b" />
  <text x="932" y="198" class="ui muted" font-size="11">Changes</text>
  <rect x="996" y="182" width="58" height="22" rx="5" fill="#e2e8f0" />
  <text x="1012" y="198" class="ui" font-size="11" font-weight="700" fill="#020617">Files</text>
  <text x="1190" y="198" class="ui warn" font-size="11" font-weight="700">Unsaved</text>

  <rect x="894" y="214" width="494" height="42" fill="#020617" stroke="#1e293b" />
  <text x="912" y="240" class="ui muted" font-size="12">src/components/terminal/terminal-preview-panel.tsx</text>
  <circle cx="1366" cy="235" r="5" fill="#fbbf24" />

  <rect x="894" y="256" width="170" height="592" fill="#020617" />
  <rect x="906" y="272" width="146" height="28" rx="6" fill="#0f172a" stroke="#334155" />
  <text x="918" y="291" class="ui muted" font-size="12">Search files</text>
  <text x="914" y="334" class="ui muted" font-size="11">src/components</text>
  <rect x="906" y="350" width="146" height="28" rx="6" fill="#1e293b" />
  <text x="918" y="369" class="ui text" font-size="11">terminal-preview...</text>
  <text x="914" y="410" class="ui muted" font-size="11">services/terminal.ts</text>
  <text x="914" y="446" class="ui muted" font-size="11">packages/shared</text>

  <rect x="1064" y="256" width="324" height="592" fill="#0b1120" stroke="#1e293b" />
  <text x="1092" y="300" class="mono accent" font-size="14">const dirty = draft !== saved;</text>
  <text x="1092" y="332" class="mono text" font-size="14">&lt;TerminalMonacoViewer</text>
  <text x="1092" y="364" class="mono text" font-size="14">  editable={canEdit}</text>
  <text x="1092" y="396" class="mono text" font-size="14">  onContentChange={setDraft}</text>
  <text x="1092" y="428" class="mono text" font-size="14">/&gt;</text>
  <rect x="1092" y="480" width="244" height="84" rx="8" fill="#111827" stroke="#334155" />
  <text x="1114" y="514" class="ui warn" font-size="13" font-weight="700">Conflict state</text>
  <text x="1114" y="540" class="ui muted" font-size="12">Reload or overwrite when mtime changed</text>
  <rect x="1092" y="604" width="108" height="30" rx="6" fill="#e2e8f0" />
  <text x="1124" y="624" class="ui" font-size="12" font-weight="700" fill="#020617">Save</text>
  <rect x="1212" y="604" width="108" height="30" rx="6" fill="#1e293b" />
  <text x="1237" y="624" class="ui muted" font-size="12">Reload</text>

  <path d="M1062 190 C1098 160 1202 160 1264 145" stroke="#22d3ee" stroke-width="3" fill="none" />
  <text x="1094" y="150" class="ui accent" font-size="13" font-weight="700">Top-right Save appears only for editable text files</text>
</svg>
