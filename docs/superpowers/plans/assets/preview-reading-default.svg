<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1440"
  height="900"
  viewBox="0 0 1440 900"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Markdown Preview default reading mode</title>
  <desc id="desc">
    Sketch of the Runweave terminal workspace with a right-side Preview panel
    opened to a Markdown file in rendered preview mode.
  </desc>
  <defs>
    <style>
      .ui {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          sans-serif;
      }
      .mono {
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      }
      .muted {
        fill: #94a3b8;
      }
      .text {
        fill: #e2e8f0;
      }
      .label {
        fill: #38bdf8;
      }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#0f172a" />
  <rect x="24" y="24" width="1392" height="852" rx="18" fill="#020617" stroke="#1e293b" />

  <rect x="24" y="24" width="1392" height="92" rx="18" fill="#111827" />
  <circle cx="54" cy="55" r="7" fill="#ef4444" />
  <circle cx="78" cy="55" r="7" fill="#f59e0b" />
  <circle cx="102" cy="55" r="7" fill="#22c55e" />
  <rect x="132" y="39" width="154" height="32" rx="16" fill="#f8fafc" />
  <text x="157" y="60" class="ui" font-size="13" font-weight="700" fill="#020617">Preview Project</text>
  <rect x="302" y="39" width="112" height="32" rx="16" fill="#1e293b" />
  <text x="330" y="60" class="ui muted" font-size="13">Terminal 1</text>
  <rect x="1134" y="39" width="134" height="32" rx="16" fill="#334155" />
  <text x="1163" y="60" class="ui text" font-size="13" font-weight="700">Preview: File</text>
  <rect x="1280" y="39" width="104" height="32" rx="16" fill="#0ea5e9" />
  <text x="1300" y="60" class="ui" font-size="13" font-weight="700" fill="#00111f">New Terminal</text>

  <rect x="44" y="136" width="832" height="720" rx="12" fill="#020617" stroke="#1f2937" />
  <text x="68" y="176" class="mono muted" font-size="15">$ pnpm dev</text>
  <text x="68" y="210" class="mono text" font-size="15">Runweave ready on http://localhost:5173</text>
  <text x="68" y="258" class="mono muted" font-size="15">$ rg Preview docs</text>
  <text x="68" y="292" class="mono text" font-size="15">docs/architecture/terminal-code-preview.md</text>
  <text x="68" y="812" class="ui muted" font-size="13">Terminal keeps its side-by-side working space.</text>

  <rect x="896" y="136" width="500" height="720" rx="12" fill="#020617" stroke="#334155" />
  <rect x="896" y="136" width="500" height="66" rx="12" fill="#0f172a" />
  <text x="920" y="176" class="ui text" font-size="16" font-weight="700">Open file</text>
  <rect x="1154" y="154" width="36" height="30" rx="6" fill="#1e293b" />
  <text x="1164" y="174" class="ui text" font-size="11" font-weight="700">EXP</text>
  <text x="1198" y="174" class="ui muted" font-size="12">Expand preview</text>
  <rect x="1338" y="154" width="34" height="30" rx="6" fill="#1e293b" />
  <text x="1350" y="174" class="ui text" font-size="13" font-weight="700">X</text>

  <rect x="896" y="202" width="500" height="48" fill="#020617" stroke="#1e293b" />
  <text x="920" y="232" class="ui muted" font-size="13">docs/architecture/terminal-code-preview.md</text>
  <rect x="1210" y="214" width="50" height="24" rx="5" fill="#1e293b" />
  <text x="1220" y="230" class="ui muted" font-size="11">Source</text>
  <rect x="1266" y="214" width="42" height="24" rx="5" fill="#1e293b" />
  <text x="1276" y="230" class="ui muted" font-size="11">Split</text>
  <rect x="1314" y="214" width="58" height="24" rx="5" fill="#e2e8f0" />
  <text x="1324" y="230" class="ui" font-size="11" font-weight="700" fill="#020617">Preview</text>

  <rect x="920" y="278" width="452" height="548" rx="8" fill="#0b1120" />
  <text x="950" y="326" class="ui text" font-size="27" font-weight="700">Terminal Preview Plan</text>
  <rect x="950" y="354" width="280" height="8" rx="4" fill="#334155" />
  <text x="950" y="410" class="ui text" font-size="16">Preview opens Markdown in reading mode first.</text>
  <rect x="950" y="444" width="370" height="8" rx="4" fill="#475569" />
  <rect x="950" y="468" width="328" height="8" rx="4" fill="#475569" />
  <rect x="950" y="492" width="390" height="8" rx="4" fill="#475569" />
  <rect x="950" y="548" width="390" height="82" rx="8" fill="#111827" stroke="#334155" />
  <text x="974" y="584" class="mono label" font-size="14">```mermaid</text>
  <text x="974" y="612" class="mono muted" font-size="14">graph TD</text>
  <rect x="950" y="682" width="310" height="8" rx="4" fill="#475569" />
  <rect x="950" y="706" width="360" height="8" rx="4" fill="#475569" />
  <rect x="950" y="730" width="284" height="8" rx="4" fill="#475569" />

  <text x="920" y="848" class="ui label" font-size="13" font-weight="700">Default change:</text>
  <text x="1030" y="848" class="ui muted" font-size="13">Markdown starts in Preview, not Split.</text>
</svg>
