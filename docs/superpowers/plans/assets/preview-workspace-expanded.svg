<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1440"
  height="900"
  viewBox="0 0 1440 900"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Preview expanded inside the Runweave workspace</title>
  <desc id="desc">
    Sketch of Preview expanded to fill the main workspace while the top project
    and terminal navigation remains visible.
  </desc>
  <defs>
    <style>
      .ui {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          sans-serif;
      }
      .mono {
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      }
      .muted {
        fill: #94a3b8;
      }
      .text {
        fill: #e2e8f0;
      }
      .accent {
        fill: #22d3ee;
      }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#0f172a" />
  <rect x="24" y="24" width="1392" height="852" rx="18" fill="#020617" stroke="#1e293b" />

  <rect x="24" y="24" width="1392" height="92" rx="18" fill="#111827" />
  <circle cx="54" cy="55" r="7" fill="#ef4444" />
  <circle cx="78" cy="55" r="7" fill="#f59e0b" />
  <circle cx="102" cy="55" r="7" fill="#22c55e" />
  <rect x="132" y="39" width="154" height="32" rx="16" fill="#f8fafc" />
  <text x="157" y="60" class="ui" font-size="13" font-weight="700" fill="#020617">Preview Project</text>
  <rect x="302" y="39" width="112" height="32" rx="16" fill="#1e293b" />
  <text x="330" y="60" class="ui muted" font-size="13">Terminal 1</text>
  <rect x="1134" y="39" width="134" height="32" rx="16" fill="#334155" />
  <text x="1163" y="60" class="ui text" font-size="13" font-weight="700">Preview: File</text>
  <rect x="1280" y="39" width="104" height="32" rx="16" fill="#0ea5e9" />
  <text x="1300" y="60" class="ui" font-size="13" font-weight="700" fill="#00111f">New Terminal</text>

  <rect x="44" y="136" width="1352" height="720" rx="12" fill="#020617" stroke="#334155" />
  <rect x="44" y="136" width="1352" height="66" rx="12" fill="#0f172a" />
  <text x="72" y="176" class="ui text" font-size="16" font-weight="700">Open file</text>
  <rect x="1060" y="154" width="36" height="30" rx="6" fill="#e2e8f0" />
  <text x="1067" y="174" class="ui" font-size="11" font-weight="700" fill="#020617">RES</text>
  <text x="1106" y="174" class="ui muted" font-size="12">Restore side panel</text>
  <rect x="1280" y="154" width="34" height="30" rx="6" fill="#1e293b" />
  <text x="1289" y="174" class="ui text" font-size="13" font-weight="700">R</text>
  <rect x="1338" y="154" width="34" height="30" rx="6" fill="#1e293b" />
  <text x="1350" y="174" class="ui text" font-size="13" font-weight="700">X</text>

  <rect x="44" y="202" width="1352" height="48" fill="#020617" stroke="#1e293b" />
  <text x="72" y="232" class="ui muted" font-size="13">docs/architecture/terminal-code-preview.md</text>
  <rect x="1196" y="214" width="50" height="24" rx="5" fill="#1e293b" />
  <text x="1206" y="230" class="ui muted" font-size="11">Source</text>
  <rect x="1252" y="214" width="42" height="24" rx="5" fill="#1e293b" />
  <text x="1262" y="230" class="ui muted" font-size="11">Split</text>
  <rect x="1300" y="214" width="58" height="24" rx="5" fill="#e2e8f0" />
  <text x="1310" y="230" class="ui" font-size="11" font-weight="700" fill="#020617">Preview</text>

  <rect x="252" y="286" width="936" height="500" rx="10" fill="#0b1120" stroke="#1e293b" />
  <text x="308" y="354" class="ui text" font-size="34" font-weight="700">Terminal Preview Plan</text>
  <text x="308" y="404" class="ui text" font-size="17">The expanded state is workspace-fullscreen, not system fullscreen.</text>
  <rect x="308" y="448" width="760" height="10" rx="5" fill="#475569" />
  <rect x="308" y="480" width="620" height="10" rx="5" fill="#475569" />
  <rect x="308" y="512" width="700" height="10" rx="5" fill="#475569" />
  <rect x="308" y="580" width="680" height="104" rx="8" fill="#111827" stroke="#334155" />
  <text x="340" y="624" class="mono accent" font-size="16">## Interaction</text>
  <text x="340" y="656" class="mono muted" font-size="15">Expand hides the terminal surface area and keeps navigation.</text>

  <rect x="72" y="800" width="410" height="34" rx="17" fill="#111827" stroke="#334155" />
  <text x="96" y="822" class="ui accent" font-size="13" font-weight="700">Click Expand:</text>
  <text x="198" y="822" class="ui muted" font-size="13">Preview fills the workspace content area.</text>
  <rect x="982" y="800" width="372" height="34" rx="17" fill="#111827" stroke="#334155" />
  <text x="1006" y="822" class="ui accent" font-size="13" font-weight="700">Click Restore or Esc:</text>
  <text x="1156" y="822" class="ui muted" font-size="13">Return to side panel.</text>
</svg>
