  <text x="104" y="372" class="mono accent" font-size="15"># Terminal Preview Plan</text>
  <text x="104" y="414" class="mono text" font-size="15">Preview can expand inside the workspace.</text>
  <text x="104" y="456" class="mono muted" font-size="15">- Default reading mode is Preview</text>
  <text x="104" y="490" class="mono muted" font-size="15">- Split remains available when needed</text>
