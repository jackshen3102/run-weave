        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      }
      .muted {
        fill: #94a3b8;
      }
      .text {
        fill: #e2e8f0;
      }
      .accent {
        fill: #22d3ee;
      }
      .green {
        fill: #86efac;
      }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#0f172a" />
  <rect x="24" y="24" width="1392" height="852" rx="18" fill="#020617" stroke="#1e293b" />
