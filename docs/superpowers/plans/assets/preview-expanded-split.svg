<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1440"
  height="900"
  viewBox="0 0 1440 900"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Expanded Markdown split view</title>
  <desc id="desc">
    Sketch of Preview expanded inside the workspace with Markdown source and
    rendered preview shown side by side at a usable width.
  </desc>
  <defs>
