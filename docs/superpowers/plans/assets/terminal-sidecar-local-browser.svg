<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #020617; }
      .panel { fill: #0f172a; stroke: #1e293b; stroke-width: 1; }
      .panel-2 { fill: #111827; stroke: #334155; stroke-width: 1; }
      .terminal { fill: #050816; stroke: #1e293b; stroke-width: 1; }
      .tab { fill: #0f172a; stroke: #334155; stroke-width: 1; }
      .tab-active { fill: #e2e8f0; stroke: #bae6fd; stroke-width: 1; }
      .button { fill: #111827; stroke: #334155; stroke-width: 1; }
      .button-active { fill: #075985; stroke: #38bdf8; stroke-width: 1; }
      .line { stroke: #334155; stroke-width: 1; }
      .line-soft { stroke: #1e293b; stroke-width: 1; }
      .cyan { stroke: #38bdf8; stroke-width: 2; }
      .text { fill: #cbd5e1; font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 15px; }
      .text-sm { fill: #94a3b8; font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 12px; }
      .text-xs { fill: #64748b; font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 10px; }
      .text-strong { fill: #f8fafc; font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 16px; font-weight: 600; }
      .text-dark { fill: #0f172a; font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 13px; font-weight: 600; }
      .mono { fill: #86efac; font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; }
      .mono-dim { fill: #64748b; font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; }
      .mono-warn { fill: #fbbf24; font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="900"/>

  <text x="40" y="44" class="text-strong">Runweave 终端右侧 Sidecar 方案 A：顶部工具 Tab + 多页签本地浏览器</text>
  <text x="40" y="70" class="text-sm">目标：左侧终端结构保持稳定，右侧升级为可扩展工具区；浏览器运行在本地客户端，不走后端 Playwright。</text>

  <rect x="40" y="100" width="1360" height="730" rx="8" class="panel"/>

  <!-- Command bar -->
  <rect x="40" y="100" width="1360" height="42" rx="8" fill="#0b1220"/>
  <line x1="40" y1="142" x2="1400" y2="142" class="line"/>
  <rect x="58" y="111" width="34" height="22" rx="4" class="button"/>
  <text x="69" y="126" class="text-sm">家</text>
  <rect x="104" y="111" width="110" height="22" rx="4" class="button"/>
  <text x="120" y="126" class="text-sm">本机连接</text>
  <rect x="230" y="111" width="132" height="22" rx="4" class="tab-active"/>
  <text x="260" y="126" class="text-dark">项目：Runweave</text>
  <rect x="368" y="111" width="96" height="22" rx="4" class="tab"/>
  <text x="388" y="126" class="text-sm">项目：Demo</text>
  <rect x="470" y="111" width="32" height="22" rx="4" class="button"/>
  <text x="481" y="126" class="text-sm">+</text>
  <text x="1014" y="126" class="text-sm">预览入口</text>
  <rect x="1084" y="111" width="72" height="22" rx="4" class="button"/>
  <text x="1106" y="126" class="text-sm">预览</text>
  <rect x="1164" y="111" width="34" height="22" rx="4" class="button"/>
  <text x="1176" y="126" class="text-sm">史</text>
  <rect x="1210" y="111" width="82" height="22" rx="4" class="button"/>
  <text x="1228" y="126" class="text-sm">新建项目</text>

  <!-- Session strip -->
  <rect x="40" y="142" width="1360" height="32" fill="#07111f"/>
  <line x1="40" y1="174" x2="1400" y2="174" class="line"/>
  <rect x="58" y="148" width="148" height="26" fill="#111827"/>
  <line x1="58" y1="173" x2="206" y2="173" class="cyan"/>
  <text x="74" y="166" class="text-sm">会话：dev server</text>
  <rect x="206" y="148" width="124" height="26" fill="#0f172a"/>
  <text x="224" y="166" class="text-sm">会话：codex</text>
  <rect x="330" y="148" width="44" height="26" fill="#0f172a"/>
  <text x="348" y="166" class="text-sm">+</text>

  <!-- Main split -->
  <rect x="40" y="174" width="860" height="656" class="terminal"/>
  <rect x="900" y="174" width="500" height="656" class="panel-2"/>
  <line x1="900" y1="174" x2="900" y2="830" class="line"/>

  <!-- Terminal content -->
  <text x="66" y="210" class="mono-dim">$ pnpm dev</text>
  <text x="66" y="236" class="mono">frontend  ready in 612 ms</text>
  <text x="66" y="262" class="mono">backend   listening on http://127.0.0.1:5001</text>
  <text x="66" y="288" class="mono">electron  connected to packaged backend</text>
  <text x="66" y="328" class="mono-dim">$ pnpm --filter ./frontend dev --host 127.0.0.1 --port 5173</text>
  <text x="66" y="354" class="mono">VITE v6.2.2  ready in 245 ms</text>
  <text x="66" y="380" class="mono">Local:   http://127.0.0.1:5173/</text>
  <text x="66" y="420" class="mono-warn">注意：右侧浏览器是本地客户端浏览器，不通过后端 Playwright。</text>
  <text x="66" y="460" class="mono-dim">$ git status --short</text>
  <text x="66" y="486" class="mono">M  frontend/src/components/terminal/terminal-sidecar.tsx</text>
  <text x="66" y="512" class="mono">A  frontend/src/components/terminal/terminal-sidecar-browser.tsx</text>
  <rect x="60" y="770" width="810" height="34" rx="4" fill="#020617" stroke="#1e293b"/>
  <text x="74" y="792" class="mono-dim">$ </text>

  <!-- Sidecar header -->
  <rect x="900" y="174" width="500" height="46" fill="#0b1220"/>
  <line x1="900" y1="220" x2="1400" y2="220" class="line"/>
  <text x="920" y="202" class="text-strong">侧边工作区</text>
  <rect x="1158" y="186" width="30" height="22" rx="4" class="button"/>
  <text x="1168" y="202" class="text-sm">扩</text>
  <rect x="1196" y="186" width="30" height="22" rx="4" class="button"/>
  <text x="1206" y="202" class="text-sm">刷</text>
  <rect x="1234" y="186" width="30" height="22" rx="4" class="button"/>
  <text x="1244" y="202" class="text-sm">拷</text>
  <rect x="1272" y="186" width="30" height="22" rx="4" class="button"/>
  <text x="1283" y="202" class="text-sm">关</text>

  <!-- Tool tabs -->
  <rect x="900" y="220" width="500" height="40" fill="#07111f"/>
  <rect x="920" y="228" width="70" height="24" rx="4" class="tab"/>
  <text x="943" y="245" class="text-sm">预览</text>
  <rect x="996" y="228" width="82" height="24" rx="4" class="button-active"/>
  <text x="1019" y="245" class="text">浏览器</text>
  <line x1="996" y1="259" x2="1078" y2="259" class="cyan"/>

  <!-- Browser tabs -->
  <rect x="916" y="272" width="468" height="30" rx="6" fill="#07111f" stroke="#1e293b"/>
  <rect x="928" y="278" width="112" height="22" rx="4" class="button-active"/>
  <text x="950" y="294" class="text-sm" fill="#e0f2fe">本地 5173</text>
  <rect x="1046" y="278" width="96" height="22" rx="4" class="tab"/>
  <text x="1074" y="294" class="text-sm">接口文档</text>
  <rect x="1148" y="278" width="100" height="22" rx="4" class="tab"/>
  <text x="1174" y="294" class="text-sm">Storybook</text>
  <rect x="1256" y="278" width="30" height="22" rx="4" class="button"/>
  <text x="1267" y="294" class="text-sm">+</text>

  <!-- Browser toolbar -->
  <rect x="916" y="306" width="468" height="36" rx="6" fill="#0f172a" stroke="#334155"/>
  <rect x="930" y="312" width="28" height="24" rx="4" class="button"/>
  <text x="939" y="329" class="text-sm">‹</text>
  <rect x="964" y="312" width="28" height="24" rx="4" class="button"/>
  <text x="973" y="329" class="text-sm">›</text>
  <rect x="998" y="312" width="44" height="24" rx="4" class="button"/>
  <text x="1009" y="328" class="text-sm">刷新</text>
  <rect x="1052" y="312" width="226" height="24" rx="4" fill="#020617" stroke="#334155"/>
  <text x="1064" y="328" class="text-sm">http://127.0.0.1:5173</text>
  <rect x="1286" y="312" width="28" height="24" rx="4" class="button"/>
  <text x="1294" y="328" class="text-sm">{}</text>
  <rect x="1322" y="312" width="28" height="24" rx="4" class="button"/>
  <path d="M1331 327 L1341 317 M1335 317 H1341 V323" stroke="#cbd5e1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Browser viewport -->
  <rect x="916" y="356" width="468" height="286" rx="6" fill="#f8fafc" stroke="#334155"/>
  <rect x="916" y="356" width="468" height="46" rx="6" fill="#e2e8f0"/>
  <text x="938" y="385" fill="#0f172a" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="600">本地 Web 应用预览</text>
  <rect x="938" y="426" width="198" height="70" rx="6" fill="#0f172a"/>
  <text x="958" y="458" fill="#e2e8f0" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14">开发服务器</text>
  <text x="958" y="480" fill="#38bdf8" font-family="SFMono-Regular, Consolas, monospace" font-size="13">127.0.0.1:5173</text>
  <rect x="1162" y="426" width="198" height="70" rx="6" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="1182" y="458" fill="#0f172a" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14">当前页面</text>
  <text x="1182" y="480" fill="#155e75" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">Runweave 前端</text>
  <rect x="938" y="526" width="422" height="24" rx="4" fill="#e2e8f0"/>
  <rect x="938" y="562" width="356" height="16" rx="3" fill="#cbd5e1"/>
  <rect x="938" y="592" width="390" height="16" rx="3" fill="#cbd5e1"/>
  <rect x="938" y="622" width="288" height="16" rx="3" fill="#cbd5e1"/>

  <!-- Notes -->
  <rect x="916" y="660" width="468" height="72" rx="6" fill="#07111f" stroke="#1e293b"/>
  <text x="936" y="688" class="text">浏览器是全局状态：页签、URL、标题、加载中、历史能力</text>
  <text x="936" y="714" class="text-sm">切换项目或终端会话不重置页签；Preview 仍按项目保存。</text>

  <!-- Future inset -->
  <rect x="916" y="752" width="468" height="58" rx="6" fill="#020617" stroke="#334155"/>
  <text x="936" y="775" class="text-sm">后续分屏模式</text>
  <rect x="1044" y="762" width="148" height="18" rx="3" fill="#075985" stroke="#38bdf8"/>
  <text x="1099" y="775" class="text-xs">浏览器</text>
  <rect x="1044" y="786" width="72" height="16" rx="3" fill="#111827" stroke="#334155"/>
  <text x="1069" y="798" class="text-xs">预览</text>
  <rect x="1122" y="786" width="70" height="16" rx="3" fill="#111827" stroke="#334155"/>
  <text x="1148" y="798" class="text-xs">Diff</text>
  <text x="1210" y="786" class="text-xs">v1 不做，等 Sidecar tool 模型稳定后再扩展</text>

  <!-- Footer legend -->
  <text x="40" y="865" class="text-sm">边界：不改后端浏览器服务，不复用 Playwright；Electron 桌面嵌入本地浏览器，支持 DevTools 和默认浏览器打开。</text>
</svg>
