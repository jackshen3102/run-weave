<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>原型标题</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --surface: #111827;
        --surface-2: #172033;
        --line: #2b364d;
        --text: #eef2f8;
        --muted: #9aa6bb;
        --accent: #38bdf8;
        --accent-weak: rgba(56, 189, 248, 0.16);
        --success: #34d399;
        --danger: #fb7185;
        --radius: 8px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      button {
        border: 0;
        color: inherit;
        cursor: pointer;
        font: inherit;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 52px 1fr;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(11, 16, 32, 0.96);
      }

      .title {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .title strong,
      .title span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .title span {
        color: var(--muted);
        font-size: 12px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .button {
        min-height: 32px;
        padding: 0 12px;
        border-radius: 7px;
        background: var(--surface-2);
        color: var(--text);
      }

      .button.primary {
        background: var(--accent);
        color: #03111a;
        font-weight: 700;
      }

      .workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
      }

      .main-panel {
        min-width: 0;
        padding: 18px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 14px;
      }

      .step-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .step {
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--muted);
      }

      .step.active {
        border-color: var(--accent);
        background: var(--accent-weak);
        color: var(--text);
      }

      .stage {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        overflow: hidden;
      }

      .stage-header {
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 14px;
        border-bottom: 1px solid var(--line);
      }

      .stage-body {
        padding: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .item {
        min-height: 120px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #0f172a;
      }

      .item h2 {
        margin: 0 0 8px;
        font-size: 15px;
      }

      .item p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .sidecar {
        min-width: 0;
        border-left: 1px solid var(--line);
        background: #080d19;
        padding: 16px;
        overflow: auto;
      }

      .sidecar h2 {
        margin: 0 0 12px;
        font-size: 14px;
      }

      .event-list {
        display: grid;
        gap: 8px;
      }

      .event {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
      }

      @media (max-width: 860px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .sidecar {
          border-left: 0;
          border-top: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <main id="app" class="app"></main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
